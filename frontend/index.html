// ── Evolución Mensual ──────────────────────────────────────────────────────────
let _evolData = null;
let _evolCharts = [];
let _rankData  = null;
let _rankCharts = [];
let _defData   = null;
let _defCharts = [];
const RANK_COLORS = ['#5c6bc0','#26a69a','#ffa726','#ab47bc','#8d6e63','#90a4ae'];

async function _loadEvolData() {
  const el = $id('evol-content');
  if (!el) return;
  const meses = $id('evol-meses') ? $id('evol-meses').value : 24;
  el.innerHTML = '<div class="loading">Cargando&#8230;</div>';
  try {
    const [d, rd, dd] = await Promise.all([
      api('/api/analytics/evolucion_mensual?meses=' + meses),
      api('/api/analytics/top_piezas?meses=6'),
      api('/api/analytics/top_defectos?meses=6'),
    ]);
    _evolData = d.meses;
    _rankData  = rd;
    _defData   = dd;
    _evolRender();
  } catch(e) {
    el.innerHTML = '<div class="loading">Error al cargar datos.</div>';
  }
}

function _evolRender() {
  const el = $id('evol-content');
  if (!el || !_evolData) return;
  const useKg = $id('evol-use-kg') ? $id('evol-use-kg').checked : false;

  _evolCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  _evolCharts = [];

  const rows = _evolData;
  if (!rows.length) {
    el.innerHTML = '<div class="loading">Sin datos para el per&#xed;odo.</div>';
    return;
  }

  const labels = rows.map(r => {
    const [y, m] = r.mes.split('-');
    return ['', 'Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m] + ' ' + y.slice(2);
  });

  const hasKg  = useKg && rows.some(r => r.kg_aprobados !== null);
  const kgModo = ($id('evol-kg-modo') || {}).value || 'ambos'; // 'ambos' | 'pieza' | 'metal'

  // helpers: pick the right kg field based on selected mode
  const _kgA  = r => kgModo === 'pieza' ? (r.kg_aprobados_pieza  || 0) : (r.kg_aprobados  || 0);
  const _kgR  = r => kgModo === 'pieza' ? (r.kg_rechazados_pieza || 0) : (r.kg_rechazados || 0);
  const _kgDv = r => r.kg_devueltos || 0;
  const _pctS = r => kgModo === 'pieza' ? (r.pct_scrap_kg_pieza ?? r.pct_scrap) : (r.pct_scrap_kg ?? r.pct_scrap);
  const _pctR = r => kgModo === 'pieza' ? (r.pct_rep_kg_pieza   ?? r.pct_reparacion) : (r.pct_rep_kg ?? r.pct_reparacion);
  const _prod = r => kgModo === 'pieza' ? (r.productividad_pieza ?? null) : (r.productividad ?? null);

  // KPIs
  const avgScrap = rows.reduce((s, r) => s + (hasKg ? _pctS(r) : r.pct_scrap), 0) / rows.length;
  const avgRep   = rows.reduce((s, r) => s + (hasKg ? _pctR(r) : r.pct_reparacion), 0) / rows.length;
  const totalProd = hasKg
    ? rows.reduce((s, r) => s + _kgA(r), 0)
    : rows.reduce((s, r) => s + r.producidas, 0);
  const totalRech = hasKg
    ? rows.reduce((s, r) => s + _kgR(r), 0)
    : rows.reduce((s, r) => s + r.rechazadas, 0);
  const totalDev = hasKg
    ? rows.reduce((s, r) => s + _kgDv(r), 0)
    : rows.reduce((s, r) => s + (r.devueltas || 0), 0);
  const avgDev = rows.reduce((s, r) => s + (hasKg && r.pct_devol_kg !== null ? r.pct_devol_kg : (r.pct_devolucion || 0)), 0) / rows.length;

  const unit = hasKg ? 'kg' : 'uds';
  const fmtV = v => hasKg ? Math.round(v).toLocaleString('es-AR') : fmt(Math.round(v));

  el.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">Total producido (${unit})</div>
        <div class="kpi-value c-blue" style="font-size:20px">${fmtV(totalProd)}</div>
      </div>
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">Total rechazado (${unit})</div>
        <div class="kpi-value c-red" style="font-size:20px">${fmtV(totalRech)}</div>
      </div>
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">Total devuelto (${unit})</div>
        <div class="kpi-value c-yellow" style="font-size:20px">${fmtV(totalDev)}</div>
      </div>
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">&#205;ndice Rechazo Interno promedio</div>
        <div class="kpi-value" style="font-size:20px;color:${avgScrap>5?'var(--red)':avgScrap>2?'var(--yellow)':'var(--green)'}">${avgScrap.toFixed(2)}%</div>
      </div>
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">&#205;ndice Reparaci&#xf3;n promedio</div>
        <div class="kpi-value" style="font-size:20px;color:var(--muted)">${avgRep.toFixed(2)}%</div>
      </div>
      <div class="kpi-card" style="min-width:130px;padding:12px 16px">
        <div class="kpi-label">&#205;ndice Devoluci&#xf3;n promedio</div>
        <div class="kpi-value" style="font-size:20px;color:#a78bfa">${avgDev.toFixed(2)}%</div>
      </div>
      ${hasKg ? (()=>{
        const prodVals = rows.map(r => _prod(r)).filter(v => v !== null && v !== undefined);
        const avgProd = prodVals.length ? prodVals.reduce((s,v) => s+v, 0) / prodVals.length : null;
        const prodLabel = kgModo === 'pieza' ? 'Productividad (piezas)' : 'Productividad (metal)';
        return avgProd !== null ? `<div class="kpi-card" style="min-width:130px;padding:12px 16px">
          <div class="kpi-label">${prodLabel}</div>
          <div class="kpi-value c-blue" style="font-size:20px">${avgProd.toFixed(1)} <span style="font-size:13px;font-weight:400">kg/hs</span></div>
        </div>` : '';
      })() : ''}
    </div>
    <div class="grid-2" style="margin-bottom:14px">
      <div class="card"><div class="card-title">Aprobado vs Rechazado vs Devuelto por mes (${unit})</div>
        <div class="chart-box"><canvas id="evol-chart-bar"></canvas></div></div>
      <div class="card"><div class="card-title">&#205;ndices de Rechazo Interno, Reparaci&#xf3;n y Devoluci&#xf3;n (%)</div>
        <div class="chart-box"><canvas id="evol-chart-pct"></canvas></div></div>
    </div>
    ${hasKg ? `<div class="card" style="margin-bottom:14px"><div class="card-title">Productividad mensual (kg / hs trabajadas) &mdash; ${kgModo === 'ambos' ? 'piezas vs total c/coladas' : kgModo === 'pieza' ? 'piezas finales' : 'total c/coladas'}</div>
      <div class="chart-box"><canvas id="evol-chart-prod"></canvas></div></div>` : ''}
    `;

  // Bar chart: approved vs rejected vs returned
  // In 'ambos' mode: single stacked bar per month where the base = kg piezas and
  // the top slice = kg coladas (overhead: sprues, risers, losses = kg_metal - kg_pieza)
  let barDatasets;
  if (!hasKg) {
    barDatasets = [
      { label: 'Aprobado',  data: rows.map(r => r.aprobadas),     backgroundColor: '#66bb6abb', borderRadius: 3, stack: 'a' },
      { label: 'Rechazado', data: rows.map(r => r.rechazadas),     backgroundColor: '#ef5350bb', borderRadius: 3, stack: 'a' },
      { label: 'Devuelto',  data: rows.map(r => r.devueltas || 0), backgroundColor: '#a78bfabb', borderRadius: 3, stack: 'a' },
    ];
  } else if (kgModo === 'ambos') {
    barDatasets = [
      { label: 'Aprobado (piezas)',  data: rows.map(r => r.kg_aprobados_pieza  || 0), backgroundColor: '#66bb6acc', borderRadius: 3, stack: 'a' },
      { label: 'Kg coladas (apro)', data: rows.map(r => Math.max(0, (r.kg_aprobados || 0) - (r.kg_aprobados_pieza || 0))), backgroundColor: '#66bb6a44', borderRadius: 0, stack: 'a', borderColor: '#66bb6a88', borderWidth: 1 },
      { label: 'Rechazado (piezas)', data: rows.map(r => r.kg_rechazados_pieza || 0), backgroundColor: '#ef5350cc', borderRadius: 3, stack: 'a' },
      { label: 'Kg coladas (rech)', data: rows.map(r => Math.max(0, (r.kg_rechazados || 0) - (r.kg_rechazados_pieza || 0))), backgroundColor: '#ef535044', borderRadius: 0, stack: 'a', borderColor: '#ef535088', borderWidth: 1 },
      { label: 'Devuelto',          data: rows.map(r => r.kg_devueltos || 0), backgroundColor: '#a78bfaaa', borderRadius: 3, stack: 'a' },
    ];
  } else {
    barDatasets = [
      { label: 'Aprobado',  data: rows.map(r => _kgA(r)),  backgroundColor: '#66bb6abb', borderRadius: 3, stack: 'a' },
      { label: 'Rechazado', data: rows.map(r => _kgR(r)),  backgroundColor: '#ef5350bb', borderRadius: 3, stack: 'a' },
      { label: 'Devuelto',  data: rows.map(r => _kgDv(r)), backgroundColor: '#a78bfabb', borderRadius: 3, stack: 'a' },
    ];
  }

  _evolCharts.push(new Chart($id('evol-chart-bar'), {
    type: 'bar',
    data: { labels, datasets: barDatasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'top', labels: { color: 'var(--fg)', font: { size: 11 } } } },
      scales: {
        x: { stacked: true, ticks: { color: 'var(--muted)', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'var(--border)' } },
        y: { stacked: true, ticks: { color: 'var(--muted)', font: { size: 11 } }, grid: { color: 'var(--border)' } }
      }
    }
  }));

  // Line chart: % scrap, % reparación, % devolución
  const pctScrap = rows.map(r => hasKg ? _pctS(r) : r.pct_scrap);
  const pctRep   = rows.map(r => hasKg ? _pctR(r) : r.pct_reparacion);
  const pctDev   = rows.map(r => hasKg && r.pct_devol_kg !== null ? r.pct_devol_kg : r.pct_devolucion);

  _evolCharts.push(new Chart($id('evol-chart-pct'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '% Rechazo Interno', data: pctScrap, borderColor: '#ef5350', backgroundColor: '#ef535022',
          tension: 0.35, fill: true, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2
        },
        {
          label: '% Reparaci\xf3n', data: pctRep, borderColor: '#ffa726', backgroundColor: 'transparent',
          tension: 0.35, fill: false, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, borderDash: [4, 3]
        },
        {
          label: '% Devoluci\xf3n', data: pctDev, borderColor: '#a78bfa', backgroundColor: 'transparent',
          tension: 0.35, fill: false, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, borderDash: [2, 4]
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'top', labels: { color: 'var(--fg)', font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + '%' } } },
      scales: {
        x: { ticks: { color: 'var(--muted)', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'var(--border)' } },
        y: { ticks: { color: 'var(--muted)', font: { size: 11 }, callback: v => v + '%' }, grid: { color: 'var(--border)' }, min: 0 }
      }
    }
  }));

  // Productividad chart: only when kg mode and data available
  if (hasKg && $id('evol-chart-prod')) {
    const nullTo0 = v => (v === null || v === undefined) ? null : v;
    const prodDs = kgModo === 'ambos' ? [
      { label: 'kg piezas / hs',    data: rows.map(r => nullTo0(r.productividad_pieza)),
        borderColor: '#4fc3f7', backgroundColor: '#4fc3f722',
        tension: 0.35, fill: true,  pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, spanGaps: false },
      { label: 'kg total (c/coladas) / hs', data: rows.map(r => nullTo0(r.productividad)),
        borderColor: '#4fc3f766', backgroundColor: 'transparent',
        tension: 0.35, fill: false, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, borderDash: [5,4], spanGaps: false },
    ] : [
      { label: 'kg aprobados / hs', data: rows.map(r => nullTo0(_prod(r))),
        borderColor: '#4fc3f7', backgroundColor: '#4fc3f722',
        tension: 0.35, fill: true,  pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, spanGaps: false },
      { label: 'kg rechazo interno / hs', data: rows.map(r => nullTo0(r.scrap_hs)),
        borderColor: '#ef5350', backgroundColor: 'transparent',
        tension: 0.35, fill: false, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, borderDash: [5,4], spanGaps: false },
      { label: 'kg devuelto / hs', data: rows.map(r => nullTo0(r.devol_hs)),
        borderColor: '#a78bfa', backgroundColor: 'transparent',
        tension: 0.35, fill: false, pointRadius: 3, pointHoverRadius: 5, borderWidth: 2, borderDash: [2,4], spanGaps: false },
    ];
    _evolCharts.push(new Chart($id('evol-chart-prod'), {
      type: 'line',
      data: { labels, datasets: prodDs },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { position: 'top', labels: { color: 'var(--fg)', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ctx.parsed.y !== null ? ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(2) + ' kg/hs' : 'Sin datos' } } },
        scales: {
          x: { ticks: { color: 'var(--muted)', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'var(--border)' } },
          y: { ticks: { color: 'var(--muted)', font: { size: 11 } }, grid: { color: 'var(--border)' }, min: 0,
               title: { display: true, text: 'kg/hs', color: 'var(--muted)', font: { size: 11 } } }
        }
      }
    }));
  }

  // Tabla de datos mensual con ambos valores de kg
  if (hasKg) {
    const tblRows = [...rows].reverse().map(r => {
      const pz = r.kg_aprobados_pieza, mt = r.kg_aprobados;
      const col = (pz != null && mt != null) ? Math.max(0, mt - pz) : null;
      const factor = (pz && mt && pz > 0) ? (mt / pz).toFixed(2) : '—';
      const [y, m] = r.mes.split('-');
      const lbl = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m] + ' ' + y;
      return `<tr>
        <td><strong>${lbl}</strong></td>
        <td style="text-align:right">${fmt(r.aprobadas)}</td>
        <td style="text-align:right;color:var(--red)">${fmt(r.rechazadas)}</td>
        <td style="text-align:right;color:var(--green)">${pz != null ? fmtKg(pz) : '—'}</td>
        <td style="text-align:right;color:var(--muted)">${col != null ? fmtKg(col) : '—'}</td>
        <td style="text-align:right;color:var(--accent)">${mt != null ? fmtKg(mt) : '—'}</td>
        <td style="text-align:right;color:var(--muted)">${factor}×</td>
        <td style="text-align:right;color:${r.pct_scrap_kg_pieza > 10 ? 'var(--red)' : r.pct_scrap_kg_pieza > 5 ? 'var(--yellow)' : 'inherit'}">${r.pct_scrap_kg_pieza != null ? r.pct_scrap_kg_pieza + '%' : '—'}</td>
        <td style="text-align:right;color:var(--muted)">${r.productividad_pieza != null ? r.productividad_pieza + ' kg/h' : '—'}</td>
      </tr>`;
    }).join('');
    el.insertAdjacentHTML('beforeend', `
      <div class="card" style="margin-top:14px">
        <div class="card-title">Detalle mensual &mdash; Kg piezas vs Kg coladas</div>
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>Mes</th>
            <th style="text-align:right">Aprobadas</th>
            <th style="text-align:right">Rechazadas</th>
            <th style="text-align:right">Kg piezas</th>
            <th style="text-align:right">Kg coladas</th>
            <th style="text-align:right">Total</th>
            <th style="text-align:right">Factor</th>
            <th style="text-align:right">% Scrap</th>
            <th style="text-align:right">Productividad</th>
          </tr></thead>
          <tbody>${tblRows}</tbody>
        </table></div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:0 4px">
          <strong>Kg piezas</strong>: peso f&#237;sico de la pieza terminada (= Excel Indicadores).
          <strong>Kg coladas</strong>: metal extra en sangr&#237;as, bebederos y p&#233;rdidas.
          <strong>Total</strong>: kg piezas + kg coladas = metal total consumido.
          <strong>Factor</strong>: kg total / kg piezas.
        </div>
      </div>`);
  }

  // ── Ranking de piezas ────────────────────────────────────────────────────────
  _rankCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  _rankCharts = [];
  if (_rankData && (_rankData.rechazadas_devueltas?.length || _rankData.reparadas?.length)) {
    const _rankTableHtml = (rows, fs='10px', ds='7px') => {
      const n = (rows||[]).length;
      const cols = (rows||[]).map(row => {
        const [y,mo] = row.mes.split('-');
        const lbl = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo]+"'"+y.slice(2);
        const items = row.top5.map((item, i) =>
          `<div style="display:flex;align-items:flex-start;gap:4px;padding:2px 0;line-height:1.3">
            <div style="width:${ds};height:${ds};border-radius:2px;background:${RANK_COLORS[i]};flex-shrink:0;margin-top:3px"></div>
            <div style="min-width:0;overflow:hidden">
              <div style="font-size:${fs};color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.nombre||'?'}</div>
              <div style="font-size:${fs};color:var(--muted)">${item.kg} kg &middot; ${item.cant} pzas</div>
            </div>
          </div>`
        ).join('');
        return `<div style="min-width:0"><div style="font-size:${fs};font-weight:600;color:var(--muted);margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:3px">${lbl}</div>${items}</div>`;
      }).join('');
      return `<div style="display:grid;grid-template-columns:repeat(${n},1fr);gap:0 10px;margin-top:10px;padding-top:4px">${cols}</div>`;
    };

    el.insertAdjacentHTML('beforeend', `
      <div style="margin-top:6px">
        <div class="sec-title" style="font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 10px">
          Ranking de piezas &mdash; \xfaltimos 6 meses
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title">Top 5 &mdash; Rechazadas + Devueltas (kg)</div>
          <div class="chart-box" style="height:170px"><canvas id="rank-chart-rd"></canvas></div>
          ${_rankTableHtml(_rankData.rechazadas_devueltas)}
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title">Top 5 &mdash; Reparadas (kg)</div>
          <div class="chart-box" style="height:170px"><canvas id="rank-chart-rep"></canvas></div>
          ${_rankTableHtml(_rankData.reparadas)}
        </div>
      </div>`);

    const _mkRankChart = (canvasId, rows) => {
      const canvas = $id(canvasId);
      if (!canvas || !rows?.length) return;
      const cm = _gcv('--muted');
      const labels = rows.map(r => { const [y,mo]=r.mes.split('-'); return ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo]+"'"+y.slice(2); });
      const maxRank = Math.max(...rows.map(r => r.top5.length));
      const datasets = Array.from({length: maxRank}, (_, rank) => ({
        label: `#${rank+1}`,
        data:   rows.map(r => r.top5[rank]?.kg ?? 0),
        _names: rows.map(r => r.top5[rank]?.nombre ?? ''),
        backgroundColor: RANK_COLORS[rank] + 'cc',
        borderRadius: 3,
      }));
      const chart = new Chart(canvas, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              title: ctx => ctx[0].label,
              label: ctx => `${ctx.dataset._names[ctx.dataIndex] || ('#'+(ctx.datasetIndex+1))}: ${ctx.parsed.y.toFixed(0)} kg`,
            }},
          },
          scales: {
            x: { ticks:{color:cm, font:{size:10}}, grid:{color:'rgba(128,128,128,.15)'} },
            y: { ticks:{color:cm, font:{size:11}}, grid:{color:'rgba(128,128,128,.15)'}, beginAtZero:true,
                 title:{display:true, text:'kg', color:cm, font:{size:10}} },
          },
        },
      });
      _rankCharts.push(chart);
    };
    _mkRankChart('rank-chart-rd',  _rankData.rechazadas_devueltas);
    _mkRankChart('rank-chart-rep', _rankData.reparadas);
  }

  // ── Defectos y reparaciones ───────────────────────────────────────────────────
  _defCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  _defCharts = [];
  if (_defData && (_defData.defectos?.length || _defData.reparaciones?.length)) {
    const _defTableHtml = (rows) => {
      const n = (rows||[]).length;
      const cols = (rows||[]).map(row => {
        const [y,mo] = row.mes.split('-');
        const lbl = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo]+"'"+y.slice(2);
        const items = (row.top5||[]).map((item, i) =>
          `<div style="display:flex;align-items:flex-start;gap:4px;padding:2px 0;line-height:1.3">
            <div style="width:7px;height:7px;border-radius:2px;background:${RANK_COLORS[i]};flex-shrink:0;margin-top:3px"></div>
            <div style="min-width:0;overflow:hidden">
              <div style="font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.nombre||'?'}</div>
              <div style="font-size:10px;color:var(--muted)">${item.cant} ocurr.</div>
            </div>
          </div>`
        ).join('');
        return `<div style="min-width:0"><div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px;border-bottom:1px solid var(--border);padding-bottom:3px">${lbl}</div>${items}</div>`;
      }).join('');
      return `<div style="display:grid;grid-template-columns:repeat(${n},1fr);gap:0 10px;margin-top:10px">${cols}</div>`;
    };
    const _mkDefChart = (canvasId, rows) => {
      const canvas = $id(canvasId);
      if (!canvas || !rows?.length) return;
      const cm = _gcv('--muted');
      const labels = rows.map(r => { const [y,mo]=r.mes.split('-'); return ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+mo]+"'"+y.slice(2); });
      const maxRank = Math.max(...rows.map(r => (r.top5||[]).length));
      const datasets = Array.from({length: maxRank}, (_, rank) => ({
        label: `#${rank+1}`,
        data:   rows.map(r => r.top5[rank]?.cant ?? 0),
        _names: rows.map(r => r.top5[rank]?.nombre ?? ''),
        backgroundColor: RANK_COLORS[rank] + 'cc',
        borderRadius: 3,
      }));
      const chart = new Chart(canvas, {
        type: 'bar', data: { labels, datasets },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: { legend:{display:false},
            tooltip:{callbacks:{ title:ctx=>ctx[0].label, label:ctx=>`${ctx.dataset._names[ctx.dataIndex]||''}: ${ctx.parsed.y} ocurr.` }} },
          scales: {
            x:{ticks:{color:cm,font:{size:10}},grid:{color:'rgba(128,128,128,.15)'}},
            y:{ticks:{color:cm,font:{size:11}},grid:{color:'rgba(128,128,128,.15)'},beginAtZero:true,title:{display:true,text:'ocurrencias',color:cm,font:{size:10}}},
          },
        },
      });
      _defCharts.push(chart);
    };
    el.insertAdjacentHTML('beforeend', `
      <div style="margin-top:6px">
        <div class="sec-title" style="font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 10px">
          Defectos y reparaciones &mdash; \xfaltimos 6 meses
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title">Top 5 &mdash; Motivos de rechazo</div>
          <div class="chart-box" style="height:170px"><canvas id="def-chart-rech"></canvas></div>
          ${_defTableHtml(_defData.defectos)}
        </div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-title">Top 5 &mdash; Tipos de reparaci\xf3n</div>
          <div class="chart-box" style="height:170px"><canvas id="def-chart-rep"></canvas></div>
          ${_defTableHtml(_defData.reparaciones)}
        </div>
      </div>`);
    _mkDefChart('def-chart-rech', _defData.defectos);
    _mkDefChart('def-chart-rep',  _defData.reparaciones);
  }
}

// ── Personal ───────────────────────────────────────────────────────────────────
const _SEC_NOMBRE = {1:'Producción',3:'Administración',6:'Laboratorio',7:'Mantenimiento',97:'Desvinculado',99:'Dirección'};
const _SEC_COLOR  = {1:'var(--accent)',3:'var(--green)',6:'var(--yellow)',7:'var(--orange)',97:'var(--muted)'};
const _MESES_CORTOS = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function _mesLabel(ym) { const [y,m]=ym.split('-'); return _MESES_CORTOS[+m]+' '+y.slice(2); }

async function showPersonal() {
  setMain('<div class="loading">Cargando personal...</div>');
  const st = S.personal;
  let d;
  try {
    const qs = new URLSearchParams({hasta: st.hasta, meses: st.meses, desvinculados: st.desvinculados});
    d = await api('/api/personal?'+qs);
  } catch(e) { setMain('<div class="loading">Error: '+e.message+'</div>'); return; }

  const mesesOpts = [3,6,12,18,24,36,48]
    .map(n=>`<option value="${n}"${n===st.meses?' selected':''}>${n} meses</option>`).join('');

  // Group by sector
  const sectores = {};
  d.forEach(p => {
    const s = p.sector;
    if (!sectores[s]) sectores[s] = [];
    sectores[s].push(p);
  });
  const ordenSec = [1,6,3,7,97];

  const seccionesHtml = ordenSec.filter(s=>sectores[s]?.length).map(s => {
    const color = _SEC_COLOR[s] || 'var(--muted)';
    const maxProm = Math.max(...sectores[s].map(p => p.n_periodos > 0 ? p.hs_periodo / p.n_periodos : 0), 1);
    const cards = sectores[s].map(p => {
      const activo = p.hs_periodo > 0;
      const prom = p.n_periodos > 0 ? Math.round(p.hs_periodo / p.n_periodos) : 0;
      const barW = prom > 0 ? Math.min(100, Math.round(prom / maxProm * 100)) : 0;
      return `
        <div class="card tr-link" style="padding:14px 16px;cursor:pointer" onclick="go('personal_detalle',${p.id})">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div>
              <div style="font-weight:600;font-size:14px">${p.nombre}</div>
              ${p.cargo?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${p.cargo}</div>`:''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:20px;font-weight:700;color:${activo?color:'var(--muted)'}">${fmt(p.hs_periodo)}<span style="font-size:11px;font-weight:400;color:var(--muted)"> hs</span></div>
              <div style="font-size:11px;color:var(--muted)">${prom?'~'+prom+' hs/mes':p.ultimo_registro?'sin datos periodo':'—'}</div>
            </div>
          </div>
          <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px">
            <div style="height:4px;width:${barW}%;background:${color};border-radius:2px;transition:width .3s"></div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            Último registro: ${p.ultimo_registro||'—'}
          </div>
        </div>`;
    }).join('');
    return `
      <div style="margin-bottom:24px">
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:${color};margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--border)">
          ${_SEC_NOMBRE[s]||'Sector '+s} <span style="color:var(--muted);font-weight:400">(${sectores[s].length})</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
          ${cards}
        </div>
      </div>`;
  }).join('');

  setMain(`
    <div class="sec-title">Personal</div>
    <div class="card" style="margin-bottom:16px">
      <div class="row-gap" style="flex-wrap:wrap;align-items:center">
        <label style="font-size:12px;color:var(--muted)">Hasta:</label>
        <input type="date" class="inp" id="pers-hasta" value="${st.hasta}" onchange="persFilter()" style="width:140px">
        <select class="inp" id="pers-meses" onchange="persFilter()" style="width:110px">${mesesOpts}</select>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer">
          <input type="checkbox" id="pers-desv" onchange="persFilter()" ${st.desvinculados?'checked':''}>
          Incluir desvinculados
        </label>
        <span style="margin-left:auto;font-size:12px;color:var(--muted)">${d.length} personas</span>
      </div>
    </div>
    ${seccionesHtml||'<div class="card"><div class="empty">Sin datos</div></div>'}
  `);
}

function persFilter() {
  S.personal.hasta = ($id('pers-hasta')||{}).value || S.personal.hasta;
  S.personal.meses = +($id('pers-meses')||{}).value || S.personal.meses;
  S.personal.desvinculados = !!($id('pers-desv')||{}).checked;
  showPersonal();
}

    </div>
    <div class="tab-bar">
      ${tabs.map((t, i) => `<button class="tab-btn${i === 0 ? ' active' : ''}" id="ptab-${t.key}" onclick="persSetTab('${t.key}',${id},this)">${t.label}</button>`).join('')}
    </div>
    <div id="pers-tab-body"></div>
  `);
  persSetTab('horas', id, document.getElementById('ptab-horas'));
}

function persSetTab(tab, id, btnEl) {
  document.querySelectorAll('[id^="ptab-"]').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  const el = document.getElementById('pers-tab-body');
  if (!el) return;
  const cache = _persCache[id] || {};
  if      (tab === 'horas')        _renderPersHoras(el, cache.horas, id);
  else if (tab === 'produccion')   _renderPersProduccion(el, id, cache);
  else if (tab === 'ots')          _renderPersOTs(el, id, cache);
}

function _renderPersHoras(el, d, id) {
  const color = _SEC_COLOR[d.persona.sector] || 'var(--accent)';
  const maxHs = Math.max(...d.historial.map(h => h.hs), 1);
  const filas = d.historial.map(h => `
    <tr>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${_mesLabel(h.mes)}</td>
      <td style="text-align:right;font-weight:600">${fmt(h.hs)}</td>
      <td style="min-width:100px">
        <div style="height:6px;background:var(--border);border-radius:3px">
          <div style="height:6px;width:${Math.round(h.hs/maxHs*100)}%;background:${color};border-radius:3px"></div>
        </div>
      </td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="card">
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Período</th>
          <th style="text-align:right">Horas</th>
          <th style="color:var(--muted);font-size:11px;font-weight:400" title="Relativo al período de mayor actividad">Rel. al máx.</th>
        </tr></thead>
        <tbody>${filas || '<tr><td colspan="3" class="empty">Sin registros</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

async function _renderPersProduccion(el, id, cache) {
  if (!cache.produccion) {
    el.innerHTML = '<div class="loading">Cargando…</div>';
    try {
      cache.produccion = await api('/api/personal/'+id+'/produccion?anio_desde=2020');
    } catch(e) {
      el.innerHTML = `<div class="card"><div class="empty">Error: ${e.message}</div></div>`;
      return;
    }
  }
  const d = cache.produccion;
  if (!d.tiene_produccion) {
    el.innerHTML = '<div class="card"><div class="empty">Sin datos de producci\xf3n para esta persona</div></div>';
    return;
  }
  const t = d.totales;
  const esMold      = !!(cache.rechazos && cache.rechazos.es_moldeador);
  const pctRechazo  = t.producidas > 0 ? (t.rechazadas / t.producidas * 100).toFixed(1) : '0.0';
  const maxProd     = Math.max(...d.meses.map(m => m.producidas), 1);
  const maxPieza    = Math.max(...d.piezas.map(p => p.producidas), 1);
  const piezasByRech = [...d.piezas].sort((a,b)=>(b.rechazadas||0)-(a.rechazadas||0)).filter(p=>p.rechazadas>0);
  const maxRechPiez  = Math.max(...piezasByRech.map(p => p.rechazadas), 1);

  const filasMeses = d.meses.map(m => {
    const lbl = _mesLabel(m.mes);
    const pct = m.producidas > 0 ? (m.rechazadas/m.producidas*100).toFixed(1) : '0.0';
    const oc  = esMold ? ` onclick="openRechMesModal(${id},'${m.mes}','${lbl.replace(/'/g,"\\'")}')"` : '';
    const td  = (val, color) => esMold
      ? `<td${oc} style="text-align:right${color?';color:'+color:''};cursor:pointer">${val}</td>`
      : `<td style="text-align:right${color?';color:'+color:''}">${val}</td>`;
    const pctTd = esMold
      ? `<td${oc} style="text-align:right;color:${parseFloat(pct)>10?'var(--red)':parseFloat(pct)>5?'var(--yellow)':'inherit'};cursor:pointer">${pct}%</td>`
      : '';
    return `<tr>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${lbl}</td>
      ${td(fmt(m.producidas), '')}
      ${td(fmt(m.aprobadas), 'var(--green)')}
      ${td(m.rechazadas||'—', 'var(--red)')}
      ${td(m.entregadas||'—', 'var(--accent)')}
      ${td(m.a_stock||'—', 'var(--muted)')}
      ${pctTd}
      <td style="min-width:80px"><div style="height:5px;background:var(--border);border-radius:2px">
        <div style="height:5px;width:${Math.round(m.producidas/maxProd*100)}%;background:var(--accent);border-radius:2px"></div>
      </div></td>
    </tr>`;
  }).join('');

  const colSpan = esMold ? 8 : 7;
  const pctTh   = esMold ? '<th style="text-align:right">% Rechazo</th>' : '';

  const filasPiezasProd = d.piezas.map(p => `
    <tr>
      <td style="font-size:12px">${p.pieza||'—'}</td>
      <td style="text-align:right">${fmt(p.producidas)}</td>
      <td style="text-align:right;color:var(--green)">${fmt(p.aprobadas)}</td>
      <td style="min-width:80px"><div style="height:5px;background:var(--border);border-radius:2px">
        <div style="height:5px;width:${Math.round(p.producidas/maxPieza*100)}%;background:var(--accent);border-radius:2px"></div>
      </div></td>
    </tr>`).join('');

  const filasPiezasRech = piezasByRech.map(p => `
    <tr>
      <td style="font-size:12px">${p.pieza||'—'}</td>
      <td style="text-align:right;color:var(--red)">${fmt(p.rechazadas)}</td>
      <td style="text-align:right;color:var(--muted);font-size:12px">${p.producidas?Math.round(p.rechazadas/p.producidas*100)+'%':'—'}</td>
      <td style="min-width:80px"><div style="height:5px;background:var(--border);border-radius:2px">
        <div style="height:5px;width:${Math.round(p.rechazadas/maxRechPiez*100)}%;background:var(--red);border-radius:2px"></div>
      </div></td>
    </tr>`).join('');

  const kpiRech = esMold ? `
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--red)">${fmt(t.rechazadas)}</div>
        <div class="kpi-label">Rechazadas</div>
      </div>
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:${parseFloat(pctRechazo)>10?'var(--red)':parseFloat(pctRechazo)>5?'var(--yellow)':'var(--green)'}">${pctRechazo}%</div>
        <div class="kpi-label">% Rechazo</div>
      </div>` : '';

  const piezasGrid = esMold ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">Top piezas por producci\xf3n</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Pieza</th><th style="text-align:right">Producidas</th><th style="text-align:right;color:var(--green)">Aprobadas</th><th style="color:var(--muted);font-size:11px;font-weight:400" title="Relativo a la pieza m\xe1s producida">Rel. al m\xe1x.</th></tr></thead>
          <tbody>${filasPiezasProd||'<tr><td colspan="4" class="empty">Sin datos</td></tr>'}</tbody>
        </table></div>
      </div>
      <div class="card">
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">Top piezas por rechazos</div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Pieza</th><th style="text-align:right;color:var(--red)">Rechazadas</th><th style="text-align:right">% de prod.</th><th style="color:var(--muted);font-size:11px;font-weight:400" title="Relativo a la pieza con m\xe1s rechazos">Rel. al m\xe1x.</th></tr></thead>
          <tbody>${filasPiezasRech||'<tr><td colspan="4" class="empty">Sin rechazos</td></tr>'}</tbody>
        </table></div>
      </div>
    </div>` : `
    <div class="card">
      <div style="font-weight:600;font-size:13px;margin-bottom:10px">Top piezas producidas</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Pieza</th><th style="text-align:right">Producidas</th><th style="text-align:right;color:var(--green)">Aprobadas</th><th style="color:var(--muted);font-size:11px;font-weight:400" title="Relativo a la pieza m\xe1s producida">Rel. al m\xe1x.</th></tr></thead>
        <tbody>${filasPiezasProd||'<tr><td colspan="4" class="empty">Sin datos</td></tr>'}</tbody>
      </table></div>
    </div>`;

  el.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700">${fmt(t.producidas)}</div>
        <div class="kpi-label">Producidas</div>
      </div>
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--green)">${fmt(t.aprobadas)}</div>
        <div class="kpi-label">Aprobadas</div>
      </div>
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:var(--accent)">${fmt(t.entregadas)}</div>
        <div class="kpi-label">Entregadas</div>
      </div>
      <div class="kpi-card" style="min-width:110px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:${t.pct_aprobacion>=90?'var(--green)':t.pct_aprobacion>=80?'var(--yellow)':'var(--red)'}">${t.pct_aprobacion}%</div>
        <div class="kpi-label">% Aprobaci\xf3n</div>
      </div>
      ${kpiRech}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-weight:600;font-size:13px;margin-bottom:10px">Tendencia mensual</div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Mes</th>
          <th style="text-align:right">Producidas</th>
          <th style="text-align:right;color:var(--green)">Aprobadas</th>
          <th style="text-align:right;color:var(--red)">Rechazadas</th>
          <th style="text-align:right;color:var(--accent)">Entregadas</th>
          <th style="text-align:right;color:var(--muted)">A stock</th>
          ${pctTh}
          <th style="color:var(--muted);font-size:11px;font-weight:400" title="Producidas relativas al mes m\xe1s productivo">Rel. al m\xe1x.</th>
        </tr></thead>
        <tbody>${filasMeses||`<tr><td colspan="${colSpan}" class="empty">Sin datos</td></tr>`}</tbody>
      </table></div>
    </div>
    ${piezasGrid}`;
}

const _OT_ESTADO = {
  K:'Cumplido Auto',   k:'Cumplido Auto',
  D:'Cumplido Manual', d:'Cumplido Manual',
  A:'Anulado c/Imp',   a:'Anulado c/Imp',
  B:'Anulado s/Imp',
  R:'Remito s/Ctrl',
  L:'Listo p/Entregar',
  P:'Programado',
  I:'Inicial',
  F:'Fundido',
  O:'Impreso',
  C:'Confirmado',
  Y:'Para Cumplir',
  T:'Trabajando',
  M:'Moldeado',
};
const _OT_TOOLTIP = {};
const _OT_COLOR = {
  K:'var(--muted)',   k:'var(--muted)',
  D:'var(--muted)',   d:'var(--muted)',
  A:'var(--red)',     a:'var(--red)',
  B:'var(--red)',
  R:'var(--yellow)',
  Y:'var(--yellow)',
  I:'var(--yellow)',  C:'var(--yellow)',
  L:'var(--green)',
  P:'var(--accent)',  O:'var(--accent)',
  F:'var(--accent)',  T:'var(--accent)',
  M:'var(--accent)',
};

// estados considerados "en progreso" (no cumplidos)
const _OT_EN_PROGRESO = new Set(['I','C','Y','O','P','T','M','F','L','R','A','a','B']);

async function _renderPersOTs(el, id, cache) {
  if (!cache.ots) {
    el.innerHTML = '<div class="loading">Cargando…</div>';
    try {
      cache.ots = await api('/api/personal/'+id+'/ots');
    } catch(e) {
      el.innerHTML = `<div class="card"><div class="empty">Error: ${e.message}</div></div>`;
      return;
    }
    // default: en progreso
  }
  const all = cache.ots;
  const q   = (cache._otsQ || '').toLowerCase();

  // estados presentes en los datos de esta persona, ordenados por frecuencia
  const conteo = {};
  all.forEach(r => { conteo[r.estado||'?'] = (conteo[r.estado||'?']||0) + 1; });
  const estadosPresentes = Object.entries(conteo).sort((a,b) => b[1]-a[1]);

  // inicializar selección: "En progreso" = todo excepto K/k
  if (!cache._otsEstados) {
    cache._otsEstados = new Set(['L']);
  }
  const sel = cache._otsEstados;

  // aplicar filtro de estado + búsqueda
  const byEstado = all.filter(r => sel.has(r.estado||'?'));
  const visible  = q ? byEstado.filter(r =>
    (r.pieza||'').toLowerCase().includes(q) ||
    (r.cliente||'').toLowerCase().includes(q) ||
    String(r.id).includes(q)
  ) : byEstado;

  const hoy = new Date().toISOString().slice(0,10);
  const tbody = visible.map(r => {
    const est   = r.estado || '?';
    const color = _OT_COLOR[est] || 'var(--muted)';
    const label = _OT_ESTADO[est] || est;
    const pend  = r.pendiente > 0 ? `<span style="color:var(--yellow)">${r.pendiente}</span>`
                : r.pendiente < 0 ? `<span style="color:var(--red)">${r.pendiente}</span>` : '—';
    const fprev   = r.fecha_prevista || '—';
    const vencida = fprev !== '—' && fprev < hoy && _OT_EN_PROGRESO.has(est);
    const fotoSrc = r.foto ? '/api/fotos/modelos/'+encodeURIComponent(r.foto) : '';
    const fotoCap = (r.pieza||'').replace(/"/g,'&quot;');
    const fotoCell = `<td style="padding:3px 6px;width:66px;vertical-align:middle">
      <div style="width:58px;height:58px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center">
        ${fotoSrc
          ? `<img src="${fotoSrc}" alt="${fotoCap}" loading="lazy" width="58" height="58"
               style="object-fit:cover;cursor:zoom-in"
               onclick="_openFotoLightbox('${fotoSrc}','${fotoCap}')"
               onerror="this.outerHTML='<span style=&quot;font-size:22px;opacity:.3&quot;>&#128247;</span>'">`
          : `<span style="font-size:22px;opacity:.3">&#128247;</span>`}
      </div>
    </td>`;
    return `<tr${vencida ? ' style="background:rgba(248,81,73,.06)"' : ''}>
      ${fotoCell}
      <td style="font-size:12px;color:var(--muted)">${r.id}</td>
      <td><span style="font-size:11px;padding:2px 7px;border-radius:10px;background:${color}22;color:${color};white-space:nowrap">${label}</span></td>
      <td style="font-size:13px">${r.pieza||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${r.cliente||'—'}</td>
      <td style="text-align:right">${r.cantidad||'—'}</td>
      <td style="text-align:right">${r.producidas||'—'}</td>
      <td style="text-align:right;color:var(--green)">${r.aprobadas||'—'}</td>
      <td style="text-align:right;color:var(--red)">${r.rechazadas||'—'}</td>
      <td style="text-align:right;color:var(--accent)">${r.entregadas||'—'}</td>
      <td style="text-align:right">${pend}</td>
      <td style="font-size:12px;color:${vencida?'var(--red)':'var(--muted)'};white-space:nowrap">${fprev}</td>
      <td style="font-size:11px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${(r.obs||'').replace(/"/g,'&quot;')}">${r.obs||''}</td>
    </tr>`;
  }).join('');

  const chip = (estado, n) => {
    const active = sel.has(estado);
    const color  = _OT_COLOR[estado] || 'var(--muted)';
    const label  = _OT_ESTADO[estado] || estado;
    return `<button
      onclick="const s=_persCache[${id}]._otsEstados;s.has('${estado}')?s.delete('${estado}'):s.add('${estado}');_renderPersOTs(document.getElementById('pers-tab-body'),${id},_persCache[${id}])"
      style="padding:4px 11px;border-radius:16px;cursor:pointer;font-size:12px;white-space:nowrap;
             border:1px solid ${active ? color : 'var(--border)'};
             background:${active ? color+'22' : 'transparent'};
             color:${active ? color : 'var(--muted)'}">
      ${label} <span style="opacity:.65">${n}</span>
    </button>`;
  };

  const chips = estadosPresentes.map(([e,n]) => chip(e,n)).join('');

  el.innerHTML = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
      ${chips}
      <span style="width:1px;height:20px;background:var(--border);margin:0 2px"></span>
      <button onclick="_persCache[${id}]._otsEstados=new Set(Object.keys(_OT_ESTADO).filter(e=>!['K','k','D','d'].includes(e)));_renderPersOTs(document.getElementById('pers-tab-body'),${id},_persCache[${id}])"
        style="padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px">En progreso</button>
      <button onclick="_persCache[${id}]._otsEstados=new Set(Object.keys(_OT_ESTADO));_renderPersOTs(document.getElementById('pers-tab-body'),${id},_persCache[${id}])"
        style="padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px">Todas</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <input class="inp" id="ots-q" placeholder="Buscar pieza, cliente, n° OT…"
        style="flex:1" value="${cache._otsQ||''}"
        oninput="_persCache[${id}]._otsQ=this.value;_renderPersOTs(document.getElementById('pers-tab-body'),${id},_persCache[${id}])">
      <span style="font-size:12px;color:var(--muted);white-space:nowrap">${visible.length} mostradas</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th style="width:66px"></th>
        <th>N° OT</th><th>Estado</th><th>Pieza</th><th>Cliente</th>
        <th style="text-align:right">Pedidas</th>
        <th style="text-align:right">Producidas</th>
        <th style="text-align:right;color:var(--green)">Aprobadas</th>
        <th style="text-align:right;color:var(--red)">Rechazadas</th>
        <th style="text-align:right;color:var(--accent)">Entregadas</th>
        <th style="text-align:right">Pendiente</th>
        <th>F. prevista</th>
        <th>Obs.</th>
      </tr></thead>
      <tbody>${tbody||`<tr><td colspan="13" class="empty">Sin órdenes para este filtro</td></tr>`}</tbody>
    </table></div>`;

  const inp = document.getElementById('ots-q');
  if (inp && document.activeElement !== inp) inp.focus();
}


function openRechMesModal(personaId, mes, label) {
  const existing = document.getElementById('rech-mes-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'rech-mes-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center';
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  modal.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;width:96vw;max-width:1200px;max-height:92vh;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;margin-bottom:14px">
        <span style="font-weight:700;font-size:14px;flex:1">${label}</span>
        <button onclick="document.getElementById('rech-mes-modal').remove()"
          style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 2px">&#10005;</button>
      </div>
      <div id="rech-mes-body" style="overflow-y:auto"><div class="loading">Cargando…</div></div>
    </div>`;
  document.body.appendChild(modal);

  api(`/api/personal/${personaId}/rechazos_mes?mes=${mes}`).then(rows => {
    if (!rows.length) {
      document.getElementById('rech-mes-body').innerHTML = '<div class="empty">Sin entradas para este mes</div>';
      return;
    }
    const totProd  = rows.reduce((s,r)=>s+(r.producidas||0),0);
    const totApro  = rows.reduce((s,r)=>s+(r.aprobadas||0),0);
    const totRech  = rows.reduce((s,r)=>s+(r.rechazadas||0),0);
    const totRep   = rows.reduce((s,r)=>s+(r.reparadas||0),0);
    const totEntr  = rows.reduce((s,r)=>s+(r.entregadas||0),0);
    const totStock = rows.reduce((s,r)=>s+(r.a_stock||0),0);
    const tbody = rows.map(r => {
      const rStyle   = r.rechazadas ? 'color:var(--red)'    : 'color:var(--muted)';
      const repStyle = r.reparadas  ? 'color:var(--yellow)' : 'color:var(--muted)';
      const aStyle   = r.aprobadas  ? 'color:var(--green)'  : 'color:var(--muted)';
      const stStyle  = r.a_stock    ? 'color:var(--muted)'  : 'color:var(--border)';
      return `<tr>
        <td style="color:var(--muted);font-size:12px;white-space:nowrap">${r.fecha_colada||'—'}</td>
        <td style="font-size:12px">${r.pieza||'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${r.material||'—'}</td>
        <td style="text-align:right">${fmt(r.producidas)}</td>
        <td style="text-align:right;${aStyle}">${r.aprobadas||'—'}</td>

        <td style="text-align:right;color:var(--yellow)">${p.rechazadas || '—'}</td>
        <td style="text-align:right;color:var(--red)">${p.devueltas || '—'}</td>

function filterPiezas(q) {
  if (!S.clienteData) return;
  const fl = S.clienteData.filter(p => !q
    || p.nombre.toLowerCase().includes(q.toLowerCase())
    || (p.codigo_pieza || '').toLowerCase().includes(q.toLowerCase())
  );
  $id('pz-tbl').innerHTML = makePiezasTable(fl, S.clienteCodigo);
}

function _infTecnicaCards(inf) {
  const defs = [
    { key: 'pieza',   label: 'Pieza',   extras: [
      { key: 'apilado',       label: 'Apilado' },
      { key: 'hojadeproceso', label: 'Hoja de proceso' },
    ]},
    { key: 'moldeo',  label: 'Moldeo',  extras: [
      { key: 'pintar_molde', label: 'Pintar molde' },
      { key: 'pintar_mota',  label: 'Pintar mota'  },
    ]},
    { key: 'colada',  label: 'Colada',  extras: [] },
    { key: 'noyeria', label: 'Noyer\xeda', extras: [
      { key: 'pintar_noyo', label: 'Pintar noyo' },
    ]},
    { key: 'calidad', label: 'Calidad', extras: [] },
    { key: 'rebaba',  label: 'Rebaba',  extras: [] },
  ];
  const cards = defs
    .filter(d => inf && inf[d.key])
    .map(d => {
      const r = inf[d.key];
      const extraHtml = d.extras
        .filter(e => r[e.key] != null && r[e.key] !== 'False' && r[e.key] !== false && r[e.key] !== 0)
        .map(e => `<span class="tag tag-b" style="font-size:11px">${e.label}</span>`)
        .join(' ');
      return `
        <div class="card">
          <div class="card-title">Inf. T\xe9cnica &mdash; ${d.label} ${extraHtml}</div>
          ${r.resumen ? `<div style="font-size:13px;font-weight:600;margin-bottom:6px">${r.resumen}</div>` : ''}
          ${r.detalle  ? `<div style="font-size:12px;color:var(--muted);white-space:pre-wrap">${r.detalle}</div>` : ''}
          ${!r.resumen && !r.detalle ? '<div class="empty" style="font-size:12px">Sin texto cargado</div>' : ''}
        </div>`;
    });
  return `<div class="sec-title" style="font-size:14px;margin:18px 0 10px">Informes t\xe9cnicos</div>
    ${cards.length
      ? `<div class="grid-inf">${cards.join('')}</div>`
      : '<div class="card"><div class="empty">Sin informes t\xe9cnicos para esta pieza</div></div>'}`;
}

function analTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const body = $id('anal-tab-body');
  if (!body) return;
  if (tab === 'defectos') {

function _expTblMap() {
  const m = {};
  S.explorer.tables.forEach(t => { m[t.display_name] = t; });
  return m;
}

function _expItemHtml(tbl, indent) {
  if (!tbl) return '';
  const ic = indent === 1 ? ' i1' : indent >= 2 ? ' i2' : '';
  const active = S.explorer.active === tbl.name ? ' active' : '';
  const connector = indent > 0 ? '<span style="color:var(--border);margin-right:4px">└</span>' : '';
  return `<div class="exp-tbl-item${ic}${active}" onclick="loadExpTable('${tbl.name}')">
    <div>${connector}${tbl.display_name}</div>
    <div class="exp-tbl-cnt">${fmt(tbl.row_count)} filas</div>
  </div>`;
}

function _renderNodes(nodes, tblMap, indent, html, seen) {
  for (const node of nodes) {
    if (typeof node === 'string') {
      const t = tblMap[node];
      if (t) { html.push(_expItemHtml(t, indent)); seen.add(t.name); }
    } else {
      const t = tblMap[node.n];
      if (t) { html.push(_expItemHtml(t, indent)); seen.add(t.name); }
      if (node.ch) _renderNodes(node.ch, tblMap, Math.min(indent + 1, 2), html, seen);
    }
  }
}

function renderExpList(q) {
  const tblMap = _expTblMap();
  const el = $id('exp-items');
  if (!el) return;

  if (q) {
    // Flat search mode
    const fl = S.explorer.tables.filter(t =>
      t.display_name.toLowerCase().includes(q) || t.name.toLowerCase().includes(q)
    );
    el.innerHTML = fl.map(t => _expItemHtml(t, 0)).join('') || '<div class="loading">Sin resultados</div>';
    return;
  }

  const seen = new Set();
  const html = [];

  for (const grp of EXP_TREE) {
    const grpNodes = grp.nodes || [];
    // Check if any table in this group exists
    const hasTables = _grpHasTables(grpNodes, tblMap);
    if (!hasTables) continue;
    html.push(`<div class="exp-grp-hdr">${grp.grp}</div>`);
    _renderNodes(grpNodes, tblMap, 0, html, seen);
  }

  // Remaining tables not in any group
  const unseen = S.explorer.tables.filter(t => !seen.has(t.name));
  if (unseen.length) {
    html.push('<div class="exp-grp-hdr">Otros</div>');
    unseen.forEach(t => html.push(_expItemHtml(t, 0)));
  }

  el.innerHTML = html.join('') || '<div class="loading">Sin tablas</div>';
}

function _grpHasTables(nodes, tblMap) {
  for (const node of nodes) {
    if (typeof node === 'string') { if (tblMap[node]) return true; }
    else { if (tblMap[node.n] || _grpHasTables(node.ch || [], tblMap)) return true; }
  }
  return false;
}

function filterExpTables(q) { renderExpList(q.toLowerCase()); }

async function loadExpTable(name) {
  S.explorer.active = name;
  S.explorer.page = 1;
  S.explorer.search = '';
  S.explorer.sort = null;
  renderExpList(($id('exp-tq') || {}).value || '');
  await fetchExpData();
}

async function fetchExpData() {
  const p = S.explorer;
  const panel = $id('exp-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="loading">Cargando...</div>';

  const qs = new URLSearchParams({ page: p.page, page_size: 50 });
  if (p.search) qs.set('search', p.search);
  if (p.sort)   { qs.set('sort', p.sort); qs.set('dir', p.dir); }

  try {
    const d = await api('/api/tables/' + encodeURIComponent(p.active) + '?' + qs);
    panel.innerHTML = `
      <div class="exp-tbl-name">${d.display_name}</div>
      <div class="exp-toolbar">
        <input class="inp" id="exp-sq" placeholder="Buscar en tabla..." value="${p.search}"
          onkeydown="if(event.key==='Enter'){S.explorer.search=this.value;S.explorer.page=1;fetchExpData()}">
        <button class="exp-btn" onclick="S.explorer.search=$id('exp-sq').value;S.explorer.page=1;fetchExpData()">Buscar</button>
        <button class="exp-btn" onclick="expExportCsv('${p.active}','${d.display_name}')">&#8595; CSV</button>
        <span style="color:var(--muted);font-size:12px;margin-left:auto">${fmt(d.total)} filas</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>${d.columns.map(c => `
            <th class="sort" onclick="expSort('${c.key}')">${c.label}${p.sort===c.key ? (p.dir==='asc'?' &#9650;':' &#9660;') : ''}</th>`).join('')}
          </tr></thead>
          <tbody>${d.rows.map(row =>
            `<tr>${d.columns.map(c=>`<td>${row[c.key] ?? ''}</td>`).join('')}</tr>`
          ).join('')}</tbody>
        </table>
      </div>
      <div class="page-bar">
        <button class="page-btn" ${d.page<=1?'disabled':''} onclick="S.explorer.page--;fetchExpData()">&#8249; Ant</button>
        <span class="page-info">P&#225;g ${d.page} / ${d.pages} &nbsp;&middot;&nbsp; ${fmt(d.total)} filas</span>
        <button class="page-btn" ${d.page>=d.pages?'disabled':''} onclick="S.explorer.page++;fetchExpData()">Sig &#8250;</button>
      </div>
    `;
  } catch(e) { if(panel) panel.innerHTML = '<div class="loading">Error: ' + e.message + '</div>'; }
}

function expSort(col) {
  S.explorer.dir = S.explorer.sort === col && S.explorer.dir === 'asc' ? 'desc' : 'asc';
  S.explorer.sort = col;
  S.explorer.page = 1;

// ── Sistema de chips genérico ──────────────────────────────────────────────────
const _chips = {};
function _getChips(tab) { return _chips[tab] || (_chips[tab] = []); }

function chipAdd(tab) {
  const inp = $id(tab + '-q');
  const raw = (inp?.value || '').trim();
  if (!raw) return;
  const arr = _getChips(tab);
  if (arr.some(c => c.raw.toLowerCase() === raw.toLowerCase())) { if (inp) inp.value = ''; return; }
  const lc = raw.toLowerCase();
  const match = _allClientes.find(c =>
    (c.codigo||'').toLowerCase()===lc || (c.nombre||'').toLowerCase()===lc || (c.fantasia||'').toLowerCase()===lc
  );
  arr.push({ raw, resolved: match ? (match.fantasia||match.nombre) : null, type: match ? 'client' : 'text' });
  if (inp) inp.value = '';
  chipRender(tab);
  _chipReload(tab);
}

function chipAddClient(tab, codigo, nombre) {
  const arr = _getChips(tab);
  if (arr.some(c => c.raw.toLowerCase() === codigo.toLowerCase())) return;
  arr.push({ raw: codigo, resolved: nombre, type: 'client' });
  chipRender(tab);
  _chipReload(tab);
}

function chipAddText(tab, raw) {
  if (!raw) return;
  const arr = _getChips(tab);
  if (arr.some(c => c.raw.toLowerCase() === raw.toLowerCase())) return;
  arr.push({ raw, resolved: null, type: 'text' });
  chipRender(tab);
  _chipReload(tab);
}

function chipRemove(tab, i) {
  _getChips(tab).splice(i, 1);
  chipRender(tab);
  _chipReload(tab);
}

function chipClear(tab) {
  _chips[tab] = [];
  chipRender(tab);
  _chipReload(tab);
}

function chipRender(tab) {
  const el = $id(tab + '-chips');
  if (!el) return;
  const chips = _getChips(tab);
  el.style.marginTop = chips.length ? '10px' : '0';
  el.innerHTML = chips.map((ch, i) => {
    const isC = ch.type === 'client';
    return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 10px;
      border-radius:12px;font-size:12px;white-space:nowrap;user-select:none;
      background:${isC?'var(--accent-dim)':'var(--surface2)'};
      color:${isC?'var(--accent)':'var(--text)'};
      border:1px solid ${isC?'var(--accent)':'var(--border)'}">
      ${isC?'<span style="opacity:.55;font-size:10px">cliente&thinsp;</span>':''}${ch.resolved||ch.raw}
      <span onclick="chipRemove('${tab}',${i})" style="cursor:pointer;opacity:.5;font-size:16px;line-height:1;padding:0 3px">&times;</span>
    </span>`;
  }).join('') + (chips.length > 1 ? `<span onclick="chipClear('${tab}')"
    style="cursor:pointer;font-size:11px;color:var(--muted);padding:4px 6px;align-self:center">Limpiar todo</span>` : '');
}

function chipQs(tab, qs) {
  _getChips(tab).forEach(ch => qs.append('search', ch.raw));
}

function _chipReload(tab) {
  ({
    pz:    () => { S.piezas.page      = 1; loadPiezasCat();   },
    pe:    () => { S.pedidos.page     = 1; loadPedidos();     },
    re:    () => { S.remitos.page     = 1; loadRemitos();     },
    tr:    () => { S.trabajos.page    = 1; loadTrabajos();    },
    mo:    () => { S.modelos.page     = 1; loadModelos();     },
    fu:    () => { S.fundiciones.page = 1; loadFundiciones(); },
    do:    () => { S.documentos.page  = 1; loadDocumentos();  },
    cl:    () => _clChipFilter(),
    stock: () => _stockChipFilter(),
    rech:  () => _rechTab === 'dev' ? _devolChipFilter() : _rechChipFilter(),
  }[tab] || (() => {}))();
}

function _clChipFilter(liveQ) {
  const chips = _getChips('cl');
  const live  = (liveQ || '').toLowerCase();
  const terms = [...chips.map(c => c.raw.toLowerCase()), live].filter(Boolean);
  const fl = terms.length
    ? _allClientes.filter(c => terms.every(q =>
        (c.nombre||'').toLowerCase().includes(q) ||
        (c.codigo||'').toLowerCase().includes(q) ||
        (c.fantasia||'').toLowerCase().includes(q) ||
        (c.email||'').toLowerCase().includes(q)
      ))
    : _allClientes;
  _renderClientesTable(fl);
}

function _stockChipFilter() {
  const chips = _getChips('stock');
  const live  = ($id('stock-q')?.value || '').toLowerCase();
  const terms = [...chips.map(c => c.raw.toLowerCase()), live].filter(Boolean);
  const items = terms.length ? _stockData.filter(r => terms.every(q =>
    (r.nombre||'').toLowerCase().includes(q) ||
    (r.codigo||'').toLowerCase().includes(q) ||
    (r.cliente||'').toLowerCase().includes(q) ||
    (r.cliente_codigo||'').toLowerCase().includes(q) ||
    (r.ubicacion||'').toLowerCase().includes(q)
  )) : _stockData;
  _renderStockRows(items);
}

function _renderPiezaInline({pieza, anual, defectos, inftecnica, raw}, piezaId) {
  const tot_ent  = anual.reduce((s,r)=>s+r.entregadas, 0);
  const tot_dev  = anual.reduce((s,r)=>s+r.devueltas,  0);
  const tot_rech = anual.reduce((s,r)=>s+r.rechazadas, 0);
  const hasStats = tot_ent > 0 || tot_dev > 0 || tot_rech > 0;
  const chartHtml = anual.length
    ? `<div class="chart-box" style="max-height:150px;margin-bottom:14px"><canvas id="chart-pz-i-${piezaId}"></canvas></div>`
    : '';
  const statsHtml = hasStats
    ? `<div class="pa-stats">
        <span class="pa-stat">Entregadas <strong class="c-blue">${fmt(tot_ent)}</strong></span>
        <span class="pa-stat">Devueltas <strong class="c-red">${fmt(tot_dev)}</strong></span>
        <span class="pa-stat">Rechazadas <strong class="c-yellow">${fmt(tot_rech)}</strong></span>
       </div>`
    : '<div class="pa-stats"><span style="color:var(--muted);font-size:12px">Sin historial de entregas registrado</span></div>';
  return statsHtml + chartHtml + _infTecnicaCards(inftecnica) + _renderRaw(raw);
}
async function togglePiezaCard(piezaId) {
  const hdr  = document.querySelector(`#pa-${piezaId} .pa-hdr`);
  const body = $id('pa-body-'+piezaId);
  if (!body) return;
  const opening = body.style.display === 'none';
  body.style.display = opening ? 'block' : 'none';
  if (hdr) hdr.classList.toggle('open', opening);
  if (opening && !body.dataset.loaded) {
    body.dataset.loaded = '1';
    body.innerHTML = '<div class="loading" style="padding:14px">Cargando...</div>';
    try {
      const d = await api('/api/analytics/piezas/'+piezaId);
      body.innerHTML = _renderPiezaInline(d, piezaId);
      const canvas = $id('chart-pz-i-'+piezaId);
      if (canvas && d.anual.length) {
        new Chart(canvas, {
          type: 'bar',
          data: {
            labels: d.anual.map(r=>r.año),
            datasets: [
              { label:'Entregadas', data:d.anual.map(r=>r.entregadas), backgroundColor:'#66bb6abb', borderRadius:3 },
              { label:'Rechazadas', data:d.anual.map(r=>r.rechazadas), backgroundColor:'#ef5350bb', borderRadius:3 },
              { label:'Devueltas',  data:d.anual.map(r=>r.devueltas),  backgroundColor:'#a78bfabb', borderRadius:3 },
            ],
          },
          options: chartDefaults(),
        });
      }
    } catch(e) {
      body.innerHTML = `<div class="empty" style="padding:14px">Error: ${e.message}</div>`;
    }
  }
}
function _openFotoLightbox(src, caption) {
  const lb = document.createElement('div');
  lb.className = 'foto-lb';
  lb.innerHTML = `<img src="${src}" alt="${caption||''}"><div class="foto-lb-cap">${caption||''}</div>`;
  lb.onclick = () => lb.remove();
  document.addEventListener('keydown', function esc(e){ if(e.key==='Escape'){lb.remove();document.removeEventListener('keydown',esc);} });
  document.body.appendChild(lb);
}
function _modeloFotoSection(fotos, count, disponible) {
  if (!count) {
    return `<div class="card" style="margin-top:14px">
      <div class="sec-title" style="font-size:13px;font-weight:600;margin-bottom:8px">Fotos del modelo</div>
      <div class="empty" style="padding:12px 0">Sin fotos para este modelo</div>
    </div>`;
  }
  const banner = !disponible
    ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">&#128247; Ruta no configurada &mdash; <code>FOTOS_MODELOS_PATH</code> en <code>main.py</code></div>`
    : '';
  const items = fotos.map(f => {
    const cap = f.comentario || f.enlacefotomodelo;
    const capEsc = cap.replace(/'/g,"\\'");
    if (!disponible) {
      return `<div class="foto-item foto-ph-item" title="${cap}">
        <div class="foto-ph">&#128247;</div>
        <div class="foto-cap">${cap}</div>
      </div>`;
    }
    const src = '/api/fotos/modelos/'+encodeURIComponent(f.enlacefotomodelo);
    return `<div class="foto-item" onclick="_openFotoLightbox('${src}','${capEsc}')">
      <img src="${src}" alt="${cap}" loading="lazy"
        onerror="this.style.display='none';this.parentNode.insertBefore(Object.assign(document.createElement('div'),{className:'foto-ph',innerHTML:'&#128247;'}),this.nextSibling);this.parentNode.classList.add('foto-ph-item');this.parentNode.onclick=null">
      <div class="foto-cap">${cap}</div>
    </div>`;
  });
  return `<div class="card" style="margin-top:14px">
    <div class="sec-title" style="font-size:13px;font-weight:600;margin-bottom:4px">Fotos del modelo (${count})</div>
    ${banner}<div class="foto-grid">${items.join('')}</div>
  </div>`;
}

async function loadDocStats() {
  const el = $id('do-stats-content'); if (!el) return;
  let stats, abiertos;
  try {
    [stats, abiertos] = await Promise.all([
      api('/api/documentos/stats?anio_desde=2018'),
      api('/api/documentos/abiertos'),
    ]);
  } catch(e) { el.innerHTML='<div class="loading">Error: '+e.message+'</div>'; return; }

  const TYPE_COLOR = { IRC:'#e74c3c', RAC:'#3498db', RAP:'#2ecc71', RMC:'#f39c12' };
  const cardsHtml = stats.totales.map(t=>`
    <div class="kpi-card" style="min-width:130px;flex:1;text-align:center">
      <div style="font-size:26px;font-weight:700;color:${TYPE_COLOR[t.tipo]||'var(--accent)'}">${fmt(t.total)}</div>
      <div class="kpi-label">${t.tipo} &mdash; ${t.nombre}</div>
      <div style="font-size:12px;color:${t.abiertos>0?'#f39c12':'var(--muted)'}">${t.abiertos} abiertos</div>
    </div>`).join('');

  const TIPOS_ORD = ['IRC','RAC','RMC','RAP'];
  const years = [...new Set(stats.por_anio.map(r=>r.anio))].sort();
  const datasets = TIPOS_ORD.map(tipo=>({
    label: tipo,
    data: years.map(y=>{ const r=stats.por_anio.find(x=>x.anio===y&&x.tipo===tipo); return r?r.n:0; }),
    backgroundColor: TYPE_COLOR[tipo]+'cc',
    borderColor: TYPE_COLOR[tipo],
    borderWidth: 1,
  }));

  const openByType = {};
  abiertos.forEach(r=>{ if(!openByType[r.tipo]) openByType[r.tipo]=[]; openByType[r.tipo].push(r); });
  const firstTipo = TIPOS_ORD.find(t=>openByType[t]?.length) || 'IRC';
  const abiertosTabs = TIPOS_ORD.filter(t=>openByType[t]?.length).map(t=>
    `<button class="tab-btn ${t===firstTipo?'active':''}" onclick="docAbiertosTab('${t}',this)">${t} (${openByType[t].length})</button>`
  ).join('');

  el.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">${cardsHtml}</div>
    <div class="card" style="margin-bottom:16px">
      <div style="font-weight:600;margin-bottom:10px;font-size:13px">Documentos por a&#241;o y tipo</div>
      <div style="height:260px"><canvas id="doc-yr-chart"></canvas></div>
    </div>
    <div class="card">
      <div style="font-weight:600;margin-bottom:10px;font-size:13px">Documentos abiertos</div>
      <div class="tab-bar" id="doc-ab-tabbar" style="margin-bottom:10px">${abiertosTabs||'<span style="color:var(--muted);font-size:12px">Ninguno abierto</span>'}</div>
      <div id="doc-ab-content"></div>
    </div>`;

  const ctx = $id('doc-yr-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: { labels: years, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: { x: { stacked: true, ticks: { font: { size: 11 } } }, y: { stacked: true, beginAtZero: true, ticks: { font: { size: 11 } } } },
    },
  });

  window._docAbiertosAll = abiertos;
  if (firstTipo) docAbiertosTab(firstTipo);
}

function estadoTag(codigo, label) {
  const up = (codigo || '').toUpperCase();
  const cls = ['K','D'].includes(up) ? 'tag-g'
    : ['A','B'].includes(up) ? 'tag-r'
    : ['R','Y','I','C'].includes(up) ? 'tag-y'
    : ['L'].includes(up) ? 'tag-b'
    : 'tag-m';
  return `<span class="tag ${cls}">${label || _OT_ESTADO[codigo] || codigo || '—'}</span>`;
}

  { id: 'dash_vencidos',   label: 'Pedidos Vencidos',     icon: '🔴', group: 'Dashboard'   },
  { id: 'dash_proximos',   label: 'Proximos a Vencer',    icon: '🟡', group: 'Dashboard'   },

  { id: 'stock',           label: 'Stock Actual',         icon: '📦', group: 'Inventario'  },
  { id: 'mejores',         label: 'Mejores Clientes',     icon: '⭐', group: 'Clientes'    },
  { id: 'pedidos',         label: 'Pedidos',              icon: '📋', group: 'Operaciones' },
  { id: 'remitos',         label: 'Remitos',              icon: '📄', group: 'Operaciones' },
  { id: 'trabajos',        label: 'Trabajos',             icon: '🔧', group: 'Operaciones' },
  { id: 'evol_bar',        label: 'Producci\xf3n Mensual', icon: '📊', group: 'Estad\xedstica' },
  { id: 'evol_pct',        label: '\xcdndices de Calidad',  icon: '📉', group: 'Estad\xedstica' },
  { id: 'evol_prod',       label: 'Productividad',          icon: '⚡', group: 'Estad\xedstica' },
  { id: 'ranking_rd',      label: 'Ranking Rechazadas',      icon: '🏆', group: 'Estad\xedstica' },
  { id: 'ranking_rep',     label: 'Ranking Reparadas',       icon: '🔧', group: 'Estad\xedstica' },
  { id: 'defectos_rech',   label: 'Motivos de Rechazo',      icon: '⚠️', group: 'Estad\xedstica' },
  { id: 'defectos_rep',    label: 'Tipos de Reparaci\xf3n',  icon: '🛠️', group: 'Estad\xedstica' },
];

let _kioskActive    = false;
let _kioskIdx       = 0;
let _kioskTimer     = null;
let _kioskPaused    = false;
let _kioskInterval  = 60; // segundos
let _kioskScrollRaf = null;

function _kioskGetConfig() {
  try {
    const s = JSON.parse(localStorage.getItem('kiosk_cfg') || '{}');
    return {
      interval: s.interval || 60,
      enabled:  s.enabled  || ['dash_vencidos','dash_proximos','dash_entregados','rechazos','evol_bar','evol_pct','evol_prod','ranking_rd','ranking_rep'],
    };
  } catch(e) { return { interval: 60, enabled: ['dash_vencidos','dash_proximos','dash_entregados','rechazos','evol_bar','evol_pct','evol_prod','ranking_rd','ranking_rep'] }; }
}
function _kioskSaveConfig(interval, enabled) {
  localStorage.setItem('kiosk_cfg', JSON.stringify({ interval, enabled }));
}
function _kioskActiveSlides() {
  const { enabled } = _kioskGetConfig();
  return KIOSK_SLIDES.filter(s => enabled.includes(s.id));
}

function kioskStart() {
  const slides = _kioskActiveSlides();
  if (!slides.length) { alert('Seleccioná al menos una vista en la pestaña Presentación.'); return; }
  _kioskActive = true;
  _kioskIdx    = 0;
  _kioskPaused = false;
  _kioskInterval = _kioskGetConfig().interval;
  document.body.classList.add('kiosk');
  if (!$id('kiosk-overlay')) {
    document.body.insertAdjacentHTML('beforeend', `
      <div id="kiosk-overlay">
        <div id="kiosk-info"></div>
        <div id="kiosk-pause" onclick="_kioskTogglePause()" title="Pausar/Reanudar">&#9646;&#9646;</div>
        <div id="kiosk-exit"  onclick="kioskStop()"         title="Salir (ESC)">&#10005;</div>
        <div id="kiosk-prev"  onclick="_kioskStep(-1)">&#8249;</div>
        <div id="kiosk-next"  onclick="_kioskStep(1)">&#8250;</div>
        <div id="kiosk-bar-wrap"><div id="kiosk-bar"></div></div>
      </div>`);
  }
  _kioskGoTo(0);
}

function kioskStop() {
  _kioskActive = false;
  _kioskStopScroll();
  document.body.classList.remove('kiosk');
  clearTimeout(_kioskTimer);
  const ov = $id('kiosk-overlay');
  if (ov) ov.remove();
}

function _kioskStopScroll() {
  if (_kioskScrollRaf) { cancelAnimationFrame(_kioskScrollRaf); _kioskScrollRaf = null; }
}

function _kioskStartAutoScroll() {
  _kioskStopScroll();
  const main = $id('main');
  if (!main) return;
  main.scrollTop = 0;

  const topPause = 2500;                                      // ms pause at top before scrolling
  const scrollMs = Math.max(_kioskInterval * 1000 - topPause, 1500); // remaining time for scroll
  let startTs = null;
  let scrollStartTs = null;

  function tick(ts) {
    if (!_kioskActive || _kioskPaused) return;               // stop when kiosk ends or pauses
    const m = $id('main');
    if (!m) return;
    if (!startTs) startTs = ts;

    if (ts - startTs < topPause) {                           // still in top pause
      _kioskScrollRaf = requestAnimationFrame(tick);
      return;
    }
    const scrollable = m.scrollHeight - m.clientHeight;
    if (scrollable <= 10) return;                            // table fits — nothing to scroll

    if (!scrollStartTs) scrollStartTs = ts;
    const progress = Math.min((ts - scrollStartTs) / scrollMs, 1);
    const t = progress < 0.5                                 // ease-in-out
      ? 2 * progress * progress
      : 1 - Math.pow(-2 * progress + 2, 2) / 2;
    m.scrollTop = t * scrollable;
    if (progress < 1) _kioskScrollRaf = requestAnimationFrame(tick);
  }
  _kioskScrollRaf = requestAnimationFrame(tick);
}

function _kioskGoTo(idx) {
  _kioskStopScroll();
  const slides = _kioskActiveSlides();
  if (!slides.length) { kioskStop(); return; }
  _kioskIdx = ((idx % slides.length) + slides.length) % slides.length;
  const slide = slides[_kioskIdx];
  const info = $id('kiosk-info');
  if (info) info.textContent = `${slide.icon} ${slide.label}  ·  ${_kioskIdx + 1} / ${slides.length}`;
  _kioskShowSlide(slide);
  _kioskResetBar();
  clearTimeout(_kioskTimer);
  if (!_kioskPaused) {
    _kioskTimer = setTimeout(() => _kioskGoTo(_kioskIdx + 1), _kioskInterval * 1000);
  }
}

function _kioskStep(dir) {
  clearTimeout(_kioskTimer);
  _kioskGoTo(_kioskIdx + dir);
}

function _kioskTogglePause() {
  _kioskPaused = !_kioskPaused;
  const btn = $id('kiosk-pause');
  if (btn) btn.innerHTML = _kioskPaused ? '&#9654;' : '&#9646;&#9646;';
  if (_kioskPaused) {
    clearTimeout(_kioskTimer);
    _kioskStopScroll();
    // freeze bar
    const bar = $id('kiosk-bar');
    if (bar) { bar.style.transition = 'none'; bar.style.width = bar.getBoundingClientRect().width / bar.parentElement.getBoundingClientRect().width * 100 + '%'; }
  } else {
    _kioskGoTo(_kioskIdx); // restarts timer + bar from current
  }
}

function _kioskResetBar() {
  const bar = $id('kiosk-bar');
  if (!bar) return;
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${_kioskInterval}s linear`;
    bar.style.width = '100%';
  }));
}

function _kioskKpi(label, val, cls) {
  return `<div class="kk"><div class="lbl">${label}</div><div class="val ${cls||''}">${val}</div></div>`;
}

function _kioskWrap(slide, sub, kpis, body) {
  const now = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  return `<div class="ktv">
    <div class="ktv-head">
      <h2>${slide.icon} ${slide.label}</h2>

// Resolves a CSS variable to its current computed value (Chart.js can't use var())
const _gcv = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim() || '#888';

let _kioskEvolCache = null;
let _kioskEvolCacheTs = 0;
let _kioskRankCache = null;
let _kioskRankCacheTs = 0;

function _kMes(mes) {
  const [y, m] = mes.split('-');
  return ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][+m]+"'"+y.slice(2);
}

function _kioskPageEvolBar(slide, meses) {
  const now = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  if (!meses || !meses.length) return _kioskWrap(slide,'','','<div class="empty-ktv">Sin datos</div>');
  const kgRows = meses.filter(r => r.kg_aprobados !== null);
  const totalApro = kgRows.reduce((s,r) => s + (r.kg_aprobados||0), 0);
  const totalRech = kgRows.reduce((s,r) => s + (r.kg_rechazados||0), 0);
  const totalDev  = kgRows.reduce((s,r) => s + (r.kg_devueltos||0), 0);
  const scrapVals = kgRows.filter(r => r.pct_scrap_kg !== null).map(r => r.pct_scrap_kg);
  const avgScrap  = scrapVals.length ? scrapVals.reduce((s,v)=>s+v,0)/scrapVals.length : null;
  const kpis = _kioskKpi('Kg Aprobados',  Math.round(totalApro).toLocaleString('es-AR'), 'c-blue')
             + _kioskKpi('Kg Rechazados', Math.round(totalRech).toLocaleString('es-AR'), 'c-red')
             + _kioskKpi('Kg Devueltos',  Math.round(totalDev).toLocaleString('es-AR'),  'c-purple')
             + (avgScrap !== null ? _kioskKpi('Rec. Interno prom.', avgScrap.toFixed(1)+'%', avgScrap>5?'c-red':avgScrap>2?'c-yellow':'c-green') : '');
  return `<div class="ktv">
    <div class="ktv-head"><h2>${slide.icon} ${slide.label}</h2>
      <div class="ktv-ts">\xdaltimos ${meses.length} meses &middot; Actualizado ${now}</div></div>
    <div class="ktv-kpis">${kpis}</div>
    <div style="background:var(--card);border-radius:10px;border:1px solid var(--border);padding:16px 20px 12px;height:calc(100vh - 230px);position:relative">
      <canvas id="kiosk-chart-bar"></canvas></div></div>`;
}

function _kioskRenderEvolBar(meses) {
  const canvas = $id('kiosk-chart-bar');
  if (!canvas) return;
  try { Chart.getChart(canvas)?.destroy(); } catch(_) {}
  const useKg = meses.some(r => r.kg_aprobados !== null);
  const ct = _gcv('--text'); const cm = _gcv('--muted');
  new Chart(canvas, {
    type: 'bar',
    data: { labels: meses.map(r => _kMes(r.mes)), datasets: [
      { label: 'Aprobado',  data: meses.map(r => useKg ? (r.kg_aprobados||0)  : (r.aprobadas||0)),  backgroundColor: '#66bb6abb', stack: 'a' },
      { label: 'Rechazado', data: meses.map(r => useKg ? (r.kg_rechazados||0) : (r.rechazadas||0)), backgroundColor: '#ef5350bb', stack: 'a' },
      { label: 'Devuelto',  data: meses.map(r => useKg ? (r.kg_devueltos||0)  : (r.devueltas||0)),  backgroundColor: '#a78bfabb', stack: 'a' },
    ]},
    options: { responsive:true, maintainAspectRatio:false,

        y: { stacked:true, ticks:{color:cm, font:{size:13}}, grid:{color:'rgba(128,128,128,.15)'},
             title:{display:true, text:useKg?'kg':'unidades', color:cm, font:{size:12}} }
      }
    }
  });
}

function _kioskPageVenc(slide, rows, emptyMsg) {
  if (!rows || !rows.length) return _kioskWrap(slide, '', '', `<div class="empty-ktv">${emptyMsg}</div>`);
  const total = rows.reduce((s,r) => s+(r.cantidadpedida||0), 0);
  const kpis = _kioskKpi('Pedidos', rows.length, 'c-blue')
    + _kioskKpi('Unidades totales', fmt(total), 'c-yellow');
  const tbody = rows.map(r => {
    const dias = r.dias != null ? r.dias : 0;
    const cls = dias >= 0
      ? (dias <= 2 ? 'venc-2' : dias <= 7 ? 'venc-7' : dias <= 15 ? 'venc-15' : 'venc-30')
      : 'venc-7';
    const diasLabel = dias === 0
      ? '<strong style="color:var(--red)">HOY</strong>'
      : dias < 0 ? '<strong style="color:var(--red)">−' + Math.abs(dias) + 'd</strong>'
      : '+' + dias + 'd';
    const prod = r.tot_producida || 0, rech = r.tot_rechazada || 0, ped = r.cantidadpedida || 0;
    const neta = prod - rech;
    const netaColor = (neta >= ped && ped > 0) ? 'var(--green)' : 'var(--accent)';
    const prodOk = (prod >= ped && ped > 0) ? ' prod-ok' : '';
    return `<tr class="${cls}${prodOk}">
