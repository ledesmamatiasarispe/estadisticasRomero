    </tr>`;
  }).join('');
  return _kioskWrap(slide, '\xfaltimos 90 d\xedas', kpis,
    `<table><thead><tr><th>Cliente</th><th>Pieza</th><th style="text-align:right">Entregadas / Pedidas</th><th style="text-align:right">%</th><th>Fecha</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageRechazos(slide, data, period) {
  const totR = data.reduce((s,c)=>s+(c.tot_rechazada||0),0);
  const totP = data.reduce((s,c)=>s+(c.tot_producida||0),0);
  const pctT = totP>0 ? (totR/totP*100).toFixed(1) : '0.0';
  const kpis = _kioskKpi('Clientes', data.length, 'c-blue')
    + _kioskKpi('Rechazadas', fmt(totR), 'c-yellow')
    + _kioskKpi('% Rechazo', pctT+'%', parseFloat(pctT)>10?'c-red':parseFloat(pctT)>5?'c-yellow':'c-green');
  if (!data.length) return _kioskWrap(slide, period, kpis, '<div class="empty-ktv">Sin rechazos en el per\xedodo</div>');
  const tbody = data.slice(0,30).map(c => {
    const cls = c.pct_rechazo>10 ? 'c-red' : c.pct_rechazo>5 ? 'c-yellow' : '';
    return `<tr>
      <td><div style="font-weight:600">${c.nombre||c.codigo}</div><div style="font-size:12px;color:var(--muted)">${c.codigo}</div></td>
      <td style="text-align:right">${fmt(c.tot_rechazada)}</td>
      <td style="text-align:right;color:var(--muted)">${fmt(c.tot_producida)}</td>
      <td style="text-align:right"><span class="${cls}" style="font-weight:700">${c.pct_rechazo}%</span></td>
      <td style="text-align:right;color:var(--muted)">${c.piezas.length} piez.</td>
    </tr>`;
  }).join('');
  return _kioskWrap(slide, period, kpis,
    `<table><thead><tr><th>Cliente</th><th style="text-align:right">Rechazadas</th><th style="text-align:right">Producidas</th><th style="text-align:right">%</th><th style="text-align:right">Piezas</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageDevol(slide, data, period) {
  const totD = data.reduce((s,c)=>s+(c.tot_devuelta||0),0);
  const totE = data.reduce((s,c)=>s+(c.tot_entregada||0),0);
  const pctT = totE>0 ? (totD/totE*100).toFixed(1) : '0.0';
  const kpis = _kioskKpi('Clientes', data.length, 'c-blue')
    + _kioskKpi('Devueltas', fmt(totD), 'c-red')
    + _kioskKpi('% Devoluci\xf3n', pctT+'%', parseFloat(pctT)>10?'c-red':parseFloat(pctT)>5?'c-yellow':'c-green');
  if (!data.length) return _kioskWrap(slide, period, kpis, '<div class="empty-ktv">Sin devoluciones en el per\xedodo</div>');
  const tbody = data.slice(0,30).map(c => {
    const cls = c.pct_devolucion>10 ? 'c-red' : c.pct_devolucion>5 ? 'c-yellow' : '';
    return `<tr>
      <td><div style="font-weight:600">${c.nombre||c.codigo}</div><div style="font-size:12px;color:var(--muted)">${c.codigo}</div></td>
      <td style="text-align:right;color:var(--red)">${fmt(c.tot_devuelta)}</td>
      <td style="text-align:right;color:var(--muted)">${fmt(c.tot_entregada)}</td>
      <td style="text-align:right"><span class="${cls}" style="font-weight:700">${c.pct_devolucion}%</span></td>
      <td style="text-align:right;color:var(--muted)">${c.piezas.length} piez.</td>
    </tr>`;
  }).join('');
  return _kioskWrap(slide, period, kpis,
    `<table><thead><tr><th>Cliente</th><th style="text-align:right">Devueltas</th><th style="text-align:right">Entregadas</th><th style="text-align:right">%</th><th style="text-align:right">Piezas</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageStock(slide, data) {
  const items = (data.items || []).slice(0, 35);
  const totalKg = (data.items||[]).reduce((s,r)=>s+(r.kg_stock||0),0);
  const kpis = _kioskKpi('Piezas', data.total_piezas||0, 'c-blue')
    + _kioskKpi('Unidades', fmt(data.total_unidades||0), 'c-green')
    + (totalKg>0 ? _kioskKpi('kg total', fmt(Math.round(totalKg)), 'c-yellow') : '');
  if (!items.length) return _kioskWrap(slide, '', kpis, '<div class="empty-ktv">Sin piezas en stock</div>');
  const tbody = items.map((r, i) => `<tr>
    <td style="color:var(--muted);font-size:13px">${i+1}</td>
    <td><div>${r.nombre}</div>${r.codigo?'<div style="font-size:12px;color:var(--muted)">'+r.codigo+'</div>':''}</td>
    <td style="font-size:13px;color:var(--accent)">${r.cliente}</td>
    <td style="text-align:right;font-weight:700;color:var(--green)">${r.stock_actual}</td>
    <td style="text-align:right;color:var(--muted)">${r.kg_stock>0?r.kg_stock.toFixed(1)+' kg':''}</td>
    <td style="font-size:12px;color:var(--muted)">${r.ubicacion||''}</td>
  </tr>`).join('');
  return _kioskWrap(slide, '', kpis,
    `<table><thead><tr><th>#</th><th>Pieza</th><th>Cliente</th><th style="text-align:right">Stock</th><th style="text-align:right">kg</th><th>Ubicaci\xf3n</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageMejores(slide, data) {
  const maxPct = Math.max(...data.map(r=>r.pct||0)) || 1;
  const kpis = _kioskKpi('Clientes activos', data.length, 'c-blue');
  if (!data.length) return _kioskWrap(slide, '', kpis, '<div class="empty-ktv">Sin datos</div>');
  const tbody = data.slice(0,25).map((r, i) => {
    const barW = Math.round((r.pct/maxPct)*100);
    const kgLabel = r.tot_kg>0 ? (r.tot_kg>=1000?(r.tot_kg/1000).toFixed(1)+'t':Math.round(r.tot_kg)+'kg') : '—';
    return `<tr>
      <td style="color:var(--muted);font-size:13px;text-align:right;padding-right:6px">${i+1}</td>
      <td><div style="font-weight:600">${r.nombre||r.codigo}</div><div style="font-size:12px;color:var(--muted)">${r.codigo}</div></td>
      <td style="text-align:right;font-weight:600;color:var(--accent)">${fmt(r.tot_entregada)}</td>
      <td style="text-align:right;color:var(--muted)">${kgLabel}</td>
      <td style="min-width:140px;padding-right:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:8px;border-radius:4px;background:var(--border)"><div style="width:${barW}%;height:8px;border-radius:4px;background:var(--accent)"></div></div>
          <span style="font-size:13px;width:40px;text-align:right">${r.pct.toFixed(1)}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
  return _kioskWrap(slide, '', kpis,
    `<table><thead><tr><th>#</th><th>Cliente</th><th style="text-align:right">Entregadas</th><th style="text-align:right">kg</th><th>Vol. relativo</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPagePedidos(slide, data) {
  const rows = (data.rows||[]).slice(0,25);
  const kpis = _kioskKpi('Total pedidos', fmt(data.total||0), 'c-blue');
  if (!rows.length) return _kioskWrap(slide, '', kpis, '<div class="empty-ktv">Sin pedidos</div>');
  const tbody = rows.map(r => `<tr>
    <td><code style="color:var(--accent);font-size:14px">${r.nropedido||r.idpedido}</code></td>
    <td style="color:var(--muted);font-size:13px">${(r.fechapedido||'').slice(0,10)}</td>
    <td><div style="font-weight:600">${r.cliente_nombre||r['c\xf3digocliente']}</div><div style="font-size:12px;color:var(--muted)">${r['c\xf3digocliente']||''}</div></td>
    <td>${estadoTag(r.estadopedido,r.estado_label)}</td>
    <td style="text-align:right;color:var(--muted)">${r.n_items}</td>
  </tr>`).join('');
  return _kioskWrap(slide, `${fmt(data.total)} pedidos`, kpis,
    `<table><thead><tr><th>Nro</th><th>Fecha</th><th>Cliente</th><th>Estado</th><th style="text-align:right">\xcdtems</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageRemitos(slide, data) {
  const rows = (data.rows||[]).slice(0,25);
  const kpis = _kioskKpi('Total remitos', fmt(data.total||0), 'c-blue');
  if (!rows.length) return _kioskWrap(slide, '', kpis, '<div class="empty-ktv">Sin remitos</div>');
  const tbody = rows.map(r => `<tr>
    <td><code style="color:var(--accent);font-size:14px">${r.idnroremito}</code></td>
    <td style="color:var(--muted);font-size:13px">${(r.fecharemito||'').slice(0,10)}</td>
    <td><div style="font-weight:600">${r.cliente_nombre||r['c\xf3digocliente']}</div><div style="font-size:12px;color:var(--muted)">${r['c\xf3digocliente']||''}</div></td>
    <td style="text-align:right;font-weight:600">${fmt(r.total_piezas)}</td>
    <td>${r.marcacontrolado==='True'||r.marcacontrolado===1?'<span class="tag tag-g">✓</span>':'<span class="tag tag-m">Pendiente</span>'}</td>
  </tr>`).join('');
  return _kioskWrap(slide, `${fmt(data.total)} remitos`, kpis,
    `<table><thead><tr><th>N\xb0 Remito</th><th>Fecha</th><th>Cliente</th><th style="text-align:right">Piezas</th><th>Estado</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

function _kioskPageTrabajos(slide, data) {
  const rows = (data.rows||[]).slice(0,25);
  const s = data.summary||{};
  const kpis = _kioskKpi('Total OTs', fmt(data.total||0), 'c-blue')
    + _kioskKpi('Producidas', fmt(s.producidas||0), 'c-blue')
    + _kioskKpi('Rechazadas', fmt(s.rechazadas||0), 'c-yellow')
    + _kioskKpi('Entregadas', fmt(s.entregadas||0), 'c-green');
  if (!rows.length) return _kioskWrap(slide, '', kpis, '<div class="empty-ktv">Sin trabajos</div>');
  const tbody = rows.map(r => `<tr>
    <td><code style="color:var(--accent);font-size:14px">${String(r.iditemtrabajo).padStart(6,'0')}</code></td>
    <td style="color:var(--muted);font-size:13px">${(r.fechaprevista||'').slice(0,10)||'—'}</td>
    <td><div style="font-size:13px">${r.cliente_nombre||r.codigo_cliente||'—'}</div></td>
    <td><div>${r.nombrepieza||'—'}</div>${r.codigo_pieza?'<div style="font-size:12px;color:var(--muted)">'+r.codigo_pieza+'</div>':''}</td>
    <td style="text-align:right">${r.cantidadproducida??'—'}</td>
    <td>${estadoTag(r.estadotrabajo,r.estado_label)}</td>
  </tr>`).join('');
  return _kioskWrap(slide, '', kpis,
    `<table><thead><tr><th>N\xb0 OT</th><th>F. Entrega</th><th>Cliente</th><th>Pieza</th><th style="text-align:right">Prod.</th><th>Estado</th></tr></thead><tbody>${tbody}</tbody></table>`);
}

async function _kioskShowSlide(slide) {
  const main = $id('main');
  if (!main) return;
  main.innerHTML = `<div class="ktv"><div class="ktv-head"><h2>${slide.icon} ${slide.label}</h2></div><div class="loading" style="padding:80px 0">Cargando…</div></div>`;
  try {
    const { url_qs, label: period } = _rechDateParams();
    let html, afterRender = null;
    switch (slide.id) {
      case 'dash_vencidos':   { const d = await api('/api/dashboard/vencidos');              html = _kioskPageVenc(slide,d,'Sin pedidos vencidos');          break; }
      case 'dash_proximos':   { const d = await api('/api/dashboard/proximos');              html = _kioskPageVenc(slide,d,'Sin pedidos pr\xf3ximos a vencer'); break; }
      case 'dash_entregados': { const d = await api('/api/dashboard/entregados');            html = _kioskPageEnt(slide,d);                                  break; }
      case 'rechazos':        { const d = await api('/api/analytics/rechazos'+url_qs);      html = _kioskPageRechazos(slide,d,period);                      break; }
      case 'devoluciones':    { const d = await api('/api/analytics/devoluciones'+url_qs);  html = _kioskPageDevol(slide,d,period);                         break; }
      case 'stock':           { const d = await api('/api/stock');                           html = _kioskPageStock(slide,d);                                break; }
      case 'mejores':         { const d = await api('/api/analytics/mejores_clientes');      html = _kioskPageMejores(slide,d);                              break; }
      case 'pedidos':         { const d = await api('/api/pedidos');                         html = _kioskPagePedidos(slide,d);                              break; }
      case 'remitos':         { const d = await api('/api/remitos');                         html = _kioskPageRemitos(slide,d);                              break; }
      case 'trabajos':        { const d = await api('/api/trabajos?page_size=50');           html = _kioskPageTrabajos(slide,d);                             break; }
      case 'evol_bar':        { const m = await _getKioskEvolData(); html = _kioskPageEvolBar(slide,m);  afterRender = () => _kioskRenderEvolBar(m);  break; }
      case 'evol_pct':        { const m = await _getKioskEvolData(); html = _kioskPageEvolPct(slide,m);  afterRender = () => _kioskRenderEvolPct(m);  break; }
      case 'evol_prod':       { const m = await _getKioskEvolData(); html = _kioskPageEvolProd(slide,m); afterRender = () => _kioskRenderEvolProd(m); break; }
      case 'ranking_rd':      { const d = await _getKioskRankData(); html = _kioskPageRanking(slide, d?.rechazadas_devueltas, 'kiosk-rank-rd');  afterRender = () => _kioskRenderRanking('kiosk-rank-rd',  d?.rechazadas_devueltas); break; }
      case 'ranking_rep':     { const d = await _getKioskRankData(); html = _kioskPageRanking(slide, d?.reparadas,            'kiosk-rank-rep'); afterRender = () => _kioskRenderRanking('kiosk-rank-rep', d?.reparadas);            break; }
      case 'defectos_rech':   { const d = await _getKioskDefData();  html = _kioskPageDefectos(slide, d?.defectos,    'kiosk-def-rech'); afterRender = () => _kioskRenderDefectos('kiosk-def-rech', d?.defectos);    break; }
      case 'defectos_rep':    { const d = await _getKioskDefData();  html = _kioskPageDefectos(slide, d?.reparaciones, 'kiosk-def-rep');  afterRender = () => _kioskRenderDefectos('kiosk-def-rep',  d?.reparaciones); break; }
      default: html = `<div class="ktv"><div class="ktv-head"><h2>${slide.icon} ${slide.label}</h2></div><div style="color:var(--muted);padding:40px">Vista no disponible.</div></div>`;
    }
    if (_kioskActive) {
      main.innerHTML = html;
      if (afterRender) requestAnimationFrame(afterRender);
      main.scrollTop = 0;
      setTimeout(_kioskStartAutoScroll, 80); // let DOM paint before measuring scrollHeight
    }
  } catch(e) {
    if (_kioskActive) main.innerHTML = `<div class="ktv"><div class="ktv-head"><h2>${slide.icon} ${slide.label}</h2></div><div style="color:var(--muted);padding:80px;text-align:center;font-size:18px">No se pudieron cargar los datos.<br><span style="font-size:14px;margin-top:8px;display:block">${e.message||''}</span></div></div>`;
  }
}

// Keyboard: ESC, arrows
document.addEventListener('keydown', e => {
  if (!_kioskActive) return;
  if (e.key === 'Escape')      { kioskStop(); }
  else if (e.key === 'ArrowRight') { _kioskStep(1); }
  else if (e.key === 'ArrowLeft')  { _kioskStep(-1); }
  else if (e.key === ' ')      { _kioskTogglePause(); e.preventDefault(); }
});

// ── Pantalla de configuración de Presentación ──────────────────────────────
function showPresentacion() {
  const cfg = _kioskGetConfig();
  const groups = [...new Set(KIOSK_SLIDES.map(s => s.group))];
  const checks = groups.map(g => {
    const slides = KIOSK_SLIDES.filter(s => s.group === g);
    return `<div style="padding:10px 14px;border-bottom:1px solid var(--border)">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">${g}</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${slides.map(s => `<label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="kk-${s.id}" ${cfg.enabled.includes(s.id)?'checked':''}
            style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
          <span style="font-size:14px">${s.icon} ${s.label}</span>
        </label>`).join('')}
      </div>
    </div>`;
  }).join('');

  const intervals = [30, 60, 120, 300].map(v =>
    `<option value="${v}" ${cfg.interval===v?'selected':''}>${v<60?v+'s':v/60+'min'}</option>`
  ).join('');

  setMain(`
    <div class="breadcrumb">
      <span class="bc-cur">&#128250; Presentaci&#243;n / Kiosk</span>
    </div>
    <div class="sec-title">Configuraci&#243;n de presentaci&#243;n</div>

    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
      <div class="card">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:12px 14px;border-bottom:1px solid var(--border)">
          Tablas a mostrar
        </div>
        ${checks}
      </div>

      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card" style="padding:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px">Intervalo entre tablas</div>
          <select id="kk-interval" style="width:100%;padding:8px 10px;border-radius:6px;
            border:1px solid var(--border);background:var(--surface2);color:var(--fg);font-size:14px">
            ${intervals}
          </select>
        </div>

        <button onclick="_kioskSaveCfg()" style="padding:12px;border-radius:8px;
          border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);
          font-size:14px;font-weight:600;cursor:pointer;width:100%">
          &#128190; Guardar configuraci&#243;n
        </button>

        <button onclick="_kioskSaveCfg(true)" style="padding:14px;border-radius:8px;
          border:none;background:var(--accent);color:#000;
          font-size:15px;font-weight:700;cursor:pointer;width:100%">
          &#9654; Iniciar presentaci&#243;n
        </button>

        <div class="card" style="padding:14px;font-size:12px;color:var(--muted)">
          <div style="margin-bottom:6px;font-weight:600;color:var(--fg)">Controles</div>
          <div><kbd style="background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px">ESC</kbd> Salir</div>
          <div style="margin-top:4px"><kbd style="background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px">&#8592; &#8594;</kbd> Tabla anterior / siguiente</div>
          <div style="margin-top:4px"><kbd style="background:var(--surface2);border:1px solid var(--border);padding:1px 5px;border-radius:3px">Espacio</kbd> Pausar / reanudar</div>
          <div style="margin-top:4px">Hover sobre la pantalla para ver botones de control</div>
        </div>
      </div>
    </div>
  `);
}

function _kioskSaveCfg(startNow = false) {
  const interval = parseInt($id('kk-interval').value);
  const enabled  = KIOSK_SLIDES.map(s => s.id).filter(id => $id('kk-'+id)?.checked);
  if (!enabled.length) { alert('Seleccion\xe1 al menos una tabla.'); return; }
  _kioskSaveConfig(interval, enabled);
  if (startNow) {
    kioskStart();
  } else {
    const btn = document.querySelector('button[onclick="_kioskSaveCfg()"]');
    if (btn) { const orig = btn.innerHTML; btn.innerHTML = '&#10003; Guardado'; setTimeout(()=>btn.innerHTML=orig, 1500); }
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────────
pollSync();
go('dashboard');
$id('main').addEventListener('scroll', () => { S.scroll[S.sec] = $id('main').scrollTop; }, { passive: true });
</script>
