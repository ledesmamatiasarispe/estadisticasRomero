<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>piezas.fundicionjoseromero.com</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --card: #1e2430;
  --border: #30363d;
  --accent: #4fc3f7;
  --purple: #a78bfa;
  --accent-dim: #1e3a5f;
  --red: #ef5350;
  --green: #66bb6a;
  --yellow: #ffa726;
  --text: #e6edf3;
  --muted: #8b949e;
  --sidebar-w: 200px;
  --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
#header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
#header h1 { font-size: 16px; font-weight: 600; color: var(--accent); cursor: pointer; }
#header h1:hover { opacity: .8; }
#header .spacer { flex: 1; }
#sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.hist-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text); cursor: pointer; padding: 3px 11px; font-size: 15px; line-height: 1.4; transition: background .12s; }
.hist-btn:hover:not(:disabled) { background: var(--bg2); }
.hist-btn:disabled { opacity: .3; cursor: default; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink:0; }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#btn-sync { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
#btn-sync:hover { background: var(--accent); color: #000; }

/* Layout */
#layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; padding: 8px 0; overflow-y: auto; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--muted); transition: all .15s; font-size: 13px; border-left: 3px solid transparent; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); background: var(--accent-dim); border-left-color: var(--accent); }
.nav-icon { width: 18px; text-align: center; }

/* Main panel */
#main { flex: 1; overflow-y: auto; padding: 20px 24px; }

/* ── Kiosk mode ──────────────────────────────────────────────────────────── */
body.kiosk #sidebar  { display: none !important; }
body.kiosk #header   { display: none !important; }
body.kiosk #layout   { display: block; height: 100vh; }
body.kiosk #main     { height: 100vh; padding: 24px 32px 20px; overflow-y: auto; scroll-behavior: auto; scrollbar-width: none; }
body.kiosk #main::-webkit-scrollbar { display: none; }

#kiosk-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 9000;
}
#kiosk-info {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.6); color: #fff; font-size: 13px; font-weight: 600;
  padding: 5px 16px; border-radius: 20px; pointer-events: none;
  letter-spacing: .03em; white-space: nowrap;
}
#kiosk-exit, #kiosk-pause {
  position: absolute; top: 8px;
  background: rgba(0,0,0,.45); color: #fff;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; cursor: pointer; pointer-events: all;
  font-size: 15px; opacity: 0; transition: opacity .25s;
}
#kiosk-exit  { right: 10px; }
#kiosk-pause { right: 48px; }
#kiosk-overlay:hover #kiosk-exit,
#kiosk-overlay:hover #kiosk-pause { opacity: 1; }
#kiosk-prev, #kiosk-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,.3); color: #fff; font-size: 36px;
  width: 44px; height: 90px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; pointer-events: all;
  opacity: 0; transition: opacity .25s;
}
#kiosk-prev { left: 0; border-radius: 0 8px 8px 0; }
#kiosk-next { right: 0; border-radius: 8px 0 0 8px; }
#kiosk-overlay:hover #kiosk-prev,
#kiosk-overlay:hover #kiosk-next { opacity: .75; }
#kiosk-bar-wrap {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: rgba(255,255,255,.08); pointer-events: none;
}
#kiosk-bar { height: 100%; width: 0%; background: var(--accent); }

/* Kiosk table-slide view */
.ktv { }
.ktv-head { margin-bottom:18px; }
.ktv-head h2 { font-size:30px; font-weight:800; margin:0 0 3px; letter-spacing:-.03em; line-height:1.1; }
.ktv-head .ktv-ts { font-size:13px; color:var(--muted); }
.ktv-kpis { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.ktv-kpis .kk { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 18px; min-width:100px; }
.ktv-kpis .kk .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
.ktv-kpis .kk .val { font-size:24px; font-weight:700; line-height:1.15; margin-top:2px; }
.ktv .tbl-wrap { border-radius:10px; overflow:hidden; border:1px solid var(--border); }
.ktv .tbl-wrap table { table-layout:auto; }
.ktv .tbl-wrap table th { font-size:12px; padding:10px 14px; background:var(--surface); }
.ktv .tbl-wrap table td { font-size:15px; padding:10px 14px; }
.ktv .empty-ktv { padding:80px; text-align:center; color:var(--muted); font-size:18px; background:var(--surface); border-radius:10px; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; color: var(--muted); font-size: 12px; }
.bc-link { cursor: pointer; }
.bc-link:hover { color: var(--accent); }
.bc-sep { color: var(--border); }
.bc-cur { color: var(--text); }

/* KPI cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 700; }
.kpi-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.c-blue { color: var(--accent); }
.c-green { color: var(--green); }
.c-red { color: var(--red); }
.tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 12px; padding: 6px 14px; transition: all .15s; }
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.pipe-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.pipe-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 120px; }
.pipe-chip .pipe-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
.pipe-chip .pipe-n { font-size: 22px; font-weight: 700; color: var(--accent); }
.pipe-chip .pipe-cant { font-size: 11px; color: var(--muted); margin-top: 2px; }
.c-yellow { color: var(--yellow); }
.c-purple { color: var(--purple); }
.tend-dd-item:hover { background: var(--surface3, var(--border)); }

/* Section title */
.sec-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

/* Grid 2 cols */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
.grid-inf { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
.foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
.foto-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: zoom-in; transition: transform .15s, box-shadow .15s; }
.foto-item:hover { transform: scale(1.03); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
.foto-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--bg2); }
.foto-item .foto-cap { font-size: 10px; color: var(--muted); padding: 4px 6px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Pieza accordion in modelo detail */
.pa-accord { border-top: 1px solid var(--border); }
.pa-accord:first-child { border-top: none; }
.pa-hdr { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; transition: background .12s; }
.pa-hdr:hover { background: var(--bg2); }
.pa-code { font-family: monospace; font-size: 11px; color: var(--muted); min-width: 72px; }
.pa-name { font-size: 13px; flex: 1; }
.pa-arrow { font-size: 11px; color: var(--muted); transition: transform .18s; flex-shrink: 0; }
.pa-hdr.open .pa-arrow { transform: rotate(90deg); }
.pa-body { display: none; padding: 14px 14px 6px; border-top: 1px solid var(--border); background: var(--bg); }
.pa-stats { display: flex; gap: 22px; font-size: 13px; margin-bottom: 14px; flex-wrap: wrap; padding: 10px 14px; background: var(--bg2); border-radius: 6px; }
.pa-stat strong { margin-left: 4px; }
.foto-ph { width: 100%; aspect-ratio: 1; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 32px; opacity: .3; }
.foto-ph-item { cursor: default; }
.foto-ph-item:hover { transform: none !important; box-shadow: none !important; }
.foto-lb { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; cursor: zoom-out; }
.foto-lb img { max-width: 90vw; max-height: 82vh; object-fit: contain; border-radius: 4px; }
.foto-lb-cap { margin-top: 10px; color: #ccc; font-size: 13px; background: rgba(0,0,0,.5); padding: 4px 14px; border-radius: 4px; max-width: 80vw; text-align: center; }

/* Vencimientos */
.dash-ot-link { color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
.dash-ot-link:hover { opacity: .75; }
.venc-30 { background-color: rgba(79,140,247,.13); }
.venc-15 { background-color: rgba(255,167,38,.15); }
.venc-7  { background-color: rgba(239,83,80,.18); }
.venc-2  { background-color: rgba(255,255,255,.22); font-weight:600; }
.prod-ok  { background-image: repeating-linear-gradient(45deg, transparent, transparent 7px, rgba(60,200,60,.28) 7px, rgba(60,200,60,.28) 14px); }
.peso-miss { background-image: repeating-linear-gradient(45deg, transparent, transparent 7px, rgba(239,83,80,.30) 7px, rgba(239,83,80,.30) 14px); }
.kg-miss    { background-image: repeating-linear-gradient(45deg, transparent, transparent 7px, rgba(255,167,38,.35) 7px, rgba(255,167,38,.35) 14px); }
.ent-completo { background-color: rgba(60,200,60,.18); }
.ent-parcial  { background-color: rgba(255,167,38,.18); }
.tr-sub > td  { padding: 0 0 6px 0 !important; border: none !important; }
@media (prefers-color-scheme: light) {
  .venc-30 { background-color: rgba(30,90,200,.08); }
  .venc-15 { background-color: rgba(200,120,0,.10); }
  .venc-7  { background-color: rgba(200,30,30,.12); }
  .venc-2  { background-color: rgba(0,0,0,.07); font-weight:700; }
  .ent-completo { background-color: rgba(30,150,30,.12); }
  .ent-parcial  { background-color: rgba(200,120,0,.12); }
}

/* OT form */
.ot-wrap { max-width: 720px; font-size: 13px; }
.ot-header { display: flex; align-items: center; gap: 12px; padding: 10px 0 14px; border-bottom: 2px solid var(--border); margin-bottom: 14px; flex-wrap: wrap; }
.ot-num { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }
.ot-ant { font-size: 12px; color: var(--muted); }
.ot-estado { margin-left: auto; }
.ot-section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
.ot-section-title { background: var(--bg2); padding: 5px 12px; font-weight: 700; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
.ot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0; }
.ot-field { padding: 8px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.ot-field:last-child { border-right: none; }
.ot-field-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 3px; }
.ot-field-value { font-size: 13px; font-weight: 500; }
.ot-field-wide { grid-column: 1 / -1; }
.ot-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.ot-row:last-child { border-bottom: none; }
.ot-row > .ot-field { flex: 1; border-bottom: none; }
.ot-row > .ot-field:last-child { border-right: none; }
.ot-noy { display: flex; padding: 0; align-items: stretch; }
.ot-noy-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 24px; border-right: 1px solid var(--border); flex: 1; }
.ot-counts { display: flex; gap: 0; flex-wrap: wrap; }
.ot-count-cell { flex: 1; min-width: 100px; padding: 10px 14px; border-right: 1px solid var(--border); text-align: center; }
.ot-count-cell:last-child { border-right: none; }
.ot-count-label { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.ot-count-val { font-size: 20px; font-weight: 700; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.rank-grid { display:flex; flex-direction:column; gap:0; padding:4px 0; }
.rank-entry { margin-bottom:6px; }
.rank-row { display:flex; align-items:center; gap:8px; }
.rank-mes { font-size:11px; color:var(--muted); width:38px; flex-shrink:0; text-align:right; }
.rank-bars { display:flex; flex:1; border-radius:4px; overflow:hidden; height:22px; min-width:0; }
.rank-seg { overflow:hidden; min-width:0; cursor:default; flex-shrink:0; }
.rank-seg:hover { filter:brightness(1.15); }
.rank-total { font-size:10px; color:var(--muted); white-space:nowrap; margin-left:6px; flex-shrink:0; }
.rank-legend { display:flex; flex-wrap:wrap; gap:2px 10px; padding:3px 0 0 46px; }
.rank-legend span { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text); }
.rank-legend i { width:8px; height:8px; border-radius:2px; flex-shrink:0; display:inline-block; }
.rank-legend .rank-lkg { color:var(--muted); margin-left:1px; }
.ktv .rank-entry  { margin-bottom:10px; }
.ktv .rank-mes    { font-size:13px; width:46px; }
.ktv .rank-bars   { height:28px; }
.ktv .rank-total  { font-size:12px; }
.ktv .rank-legend { padding:3px 0 0 54px; gap:3px 14px; }
.ktv .rank-legend span { font-size:12px; }
.ktv .rank-legend i    { width:10px; height:10px; }

/* Table */
.tbl-wrap { overflow-x: auto; }
.tbl-wrap > table { width: max-content; min-width: 100%; }
table { border-collapse: collapse; font-size: 13px; }
th { background: var(--surface2); color: var(--muted); font-weight: 500; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
th.sort { cursor: pointer; user-select: none; }
th.sort:hover { color: var(--text); }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
.tr-link { cursor: pointer; }
.tr-link:hover td { background: #1a2744; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.tag-g { background: #1b3a1f; color: var(--green); }
.tag-r { background: #3a1b1b; color: var(--red); }
.tag-y { background: #3a2e1b; color: var(--yellow); }
.tag-b { background: var(--accent-dim); color: var(--accent); }
.tag-m { background: var(--surface2); color: var(--muted); }

/* Inputs */
.row-gap { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
.inp { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px; outline: none; }
.inp:focus { border-color: var(--accent); }
.inp-grow { flex: 1; }

/* Pagination */
.page-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.page-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn:disabled { opacity: .4; cursor: default; }
.page-info { font-size: 12px; color: var(--muted); }

/* Charts */
.chart-box { position: relative; height: 240px; }

/* DB card */
.db-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color .15s; }
.db-card:hover { border-color: var(--accent); }
.db-card .db-icon { font-size: 32px; }
.db-card .db-info .db-title { font-weight: 600; margin-bottom: 4px; }
.db-card .db-info .db-sub { color: var(--muted); font-size: 12px; }
.db-card .db-btn { margin-left: auto; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); padding: 6px 14px; border-radius: 6px; font-size: 12px; flex-shrink: 0; }

/* Explorer */
#exp-wrap { display: flex; height: calc(100vh - var(--header-h) - 60px); overflow: hidden; margin: 0 -24px -20px; }
#exp-list { width: 220px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.exp-search { padding: 8px; border-bottom: 1px solid var(--border); }
.exp-search input { width: 100%; }
.exp-tbl-item { padding: 6px 14px 6px 14px; cursor: pointer; font-size: 12px; color: var(--muted); border-left: 3px solid transparent; }
.exp-tbl-item:hover { background: var(--surface2); color: var(--text); }
.exp-tbl-item.active { border-left-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.exp-tbl-item.i1 { padding-left: 26px; }
.exp-tbl-item.i2 { padding-left: 40px; }
.exp-tbl-cnt { font-size: 11px; color: var(--muted); }
.exp-grp-hdr { padding: 10px 14px 4px; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); border-top: 1px solid var(--border); margin-top: 2px; }
.exp-grp-hdr:first-child { border-top: none; margin-top: 0; }
#exp-panel { flex: 1; overflow-y: auto; padding: 16px; }
.exp-tbl-name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.exp-toolbar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.exp-toolbar input { flex: 1; }
.exp-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }
.exp-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Defect bars */
.def-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.def-lbl { width: 150px; font-size: 12px; text-align: right; flex-shrink: 0; color: var(--muted); }
.def-bg { flex: 1; background: var(--surface2); border-radius: 3px; height: 14px; overflow: hidden; }
.def-fill { height: 100%; background: var(--red); border-radius: 3px; }
.def-cnt { width: 50px; font-size: 12px; font-weight: 600; }

/* Loading / empty */
.loading { color: var(--muted); padding: 40px; text-align: center; }
.empty { color: var(--muted); padding: 20px; text-align: center; font-style: italic; font-size: 13px; }

/* Ficha de cliente */
.ficha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px 20px; }
.ficha-fld { display: flex; flex-direction: column; gap: 2px; }
.ficha-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
.ficha-val { font-size: 13px; color: var(--text); word-break: break-all; }
.ficha-sep { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }

/* Progress bar */
#sync-progress { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 6px 16px 7px; display: none; z-index: 100; }
#sync-progress.visible { display: block; }
.prog-row { display: flex; align-items: center; gap: 10px; }
.prog-phase { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 180px; }
.prog-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.prog-fill.indeterminate { width: 30% !important; animation: prog-slide 1.2s ease-in-out infinite; }
.prog-pct { font-size: 11px; color: var(--muted); min-width: 36px; text-align: right; }
@keyframes prog-slide { 0%{transform:translateX(-120%)} 100%{transform:translateX(400%)} }
</style>
</head>
<body>

<div id="header">
  <h1 onclick="go('dashboard')">&#9881; piezas.fundicionjoseromero.com</h1>
  <button class="hist-btn" id="hist-back" onclick="goBack()"    disabled title="Atr&#225;s (Alt+&#8592;)">&#8592;</button>
  <button class="hist-btn" id="hist-fwd"  onclick="goForward()" disabled title="Adelante (Alt+&#8594;)">&#8594;</button>

  <nav id="sidebar">
    <div class="nav-item active" data-sec="dashboard" onclick="go('dashboard')">

    </div>

    </div>
    <div class="nav-item" data-sec="analisis" onclick="go('analisis')">
      <span class="nav-icon">&#128269;</span> An&#225;lisis
    </div>
    <div class="nav-item" data-sec="trabajos" onclick="go('trabajos')">
      <span class="nav-icon">&#128295;</span> Trabajos
    </div>
    <div class="nav-item" data-sec="pedidos" onclick="go('pedidos')">
      <span class="nav-icon">&#128203;</span> Pedidos
    </div>
    <div class="nav-item" data-sec="remitos" onclick="go('remitos')">
      <span class="nav-icon">&#128230;</span> Remitos
    </div>
    <div class="nav-item" data-sec="piezas" onclick="go('piezas')">
      <span class="nav-icon">&#9881;</span> Piezas
    </div>
    <div class="nav-item" data-sec="modelos" onclick="go('modelos')">
      <span class="nav-icon">&#9651;</span> Modelos
    </div>
    <div class="nav-item" data-sec="fundiciones" onclick="go('fundiciones')">
      <span class="nav-icon">&#128293;</span> Fundiciones
    </div>
    <div class="nav-item" data-sec="documentos" onclick="go('documentos')">
      <span class="nav-icon">&#128196;</span> Documentos
    </div>
    <div class="nav-item" data-sec="stock" onclick="go('stock')">
      <span class="nav-icon">&#128230;</span> Stock
    </div>
    <div class="nav-item" data-sec="personal" onclick="go('personal')">
      <span class="nav-icon">&#128101;</span> Personal
    </div>

      style="border-top:1px solid var(--border);margin-top:4px">
      <span class="nav-icon">&#128250;</span> Presentaci&#243;n
    </div>
  </nav>
  <main id="main">
    <div class="loading">Iniciando...</div>
  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  sec: 'dashboard',
  charts: {},
  explorer: { tables: [], active: null, page: 1, search: '', sort: null, dir: 'asc' },
  clienteData: null,
  trabajos:    { page: 1, año: '', cliente: '', estado: '', search: '', ot_id: '', origen: '' },
  pedidos:     { page: 1, año: '', cliente: '', estado: '', search: '' },
  remitos:     { page: 1, año: '', cliente: '', search: '' },
  piezas:      { page: 1, cliente: '', search: '', habilitado: '' },
  modelos:     { page: 1, cliente: '', search: '', habilitado: '' },
  fundiciones: { page: 1, año: '', cerrada: '', search: '' },
  documentos:  { page: 1, año: '', cliente: '', tipo: '', search: '' },
  personal:    { hasta: new Date().toISOString().slice(0,10), meses: 12, desvinculados: false },
  modeloNavCtx: { cliente: null, search: '', habilitado: null },
  hist: [],
  histIdx: -1,
  scroll: {},
  _pendingScroll: 0,
  dashView: 'pedido',
  _dashRows: {},
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function $id(id) { return document.getElementById(id); }
function setMain(html) { $id('main').innerHTML = html; }
function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('es-AR'); }
function fmtKg(n) { return n == null ? '—' : Number(n).toLocaleString('es-AR', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' kg'; }

function tagClass(tasa) { return tasa > 10 ? 'tag-r' : tasa > 0 ? 'tag-y' : 'tag-g'; }
function _lbl(k) {
  return k.replace(/[_]/g,' ').replace(/^[a-záéíóúñ]/,c=>c.toUpperCase());
}
function _fmtRaw(v) {
  if (v === 'True'  || v === true)  return '<span class="tag tag-g" style="font-size:11px">S\xed</span>';
  if (v === 'False' || v === false) return null;
  if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
  if (v === 0 || v === '0') return '0';
  return v != null && v !== '' ? String(v) : null;
}
function _renderRaw(obj) {
  if (!obj) return '';
  const rows = Object.entries(obj)
    .map(([k,v]) => { const fv = _fmtRaw(v); return fv != null ? fld(_lbl(k), fv) : ''; })
    .filter(Boolean);
  if (!rows.length) return '';
  return `<div class="card" style="margin-top:14px">
    <div class="card-title">Datos del registro</div>
    <div class="ficha-grid">${rows.join('')}</div>
  </div>`;
}
function fmtFund(cod) {
  const n = parseInt(cod); if (isNaN(n)) return cod;
  return 'Horno ' + Math.floor(n / 100) + '—' + (2000 + n % 100);
}

async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function destroyCharts() {
  for (const k in S.charts) { try { S.charts[k].destroy(); } catch(e){} }
  S.charts = {};
}
function navToModelo(modeloId) {
  S.modeloNavCtx = {
    cliente:   S.modelos.cliente   || null,
    search:    S.modelos.search    || '',
    habilitado: S.modelos.habilitado != null && S.modelos.habilitado !== '' ? S.modelos.habilitado : null,
  };
  go('modelo', modeloId);
}
function navToPieza(piezaId, clienteCodigo) {
  S.modeloNavCtx = { cliente: clienteCodigo || null, search: '', habilitado: null };
  go('pieza', piezaId);
}
function chartDefaults() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
      y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
    },
  };
}

function _restoreScroll() {
  const pos = S._pendingScroll;
  if (!pos) return;
  S._pendingScroll = 0;
  requestAnimationFrame(() => { const m = $id('main'); if (m) m.scrollTop = pos; });
}

// ── Navigation ─────────────────────────────────────────────────────────────────
let _navFromHist = false;

function _updateHistBtns() {
  const b = $id('hist-back'), f = $id('hist-fwd');
  if (b) b.disabled = S.histIdx <= 0;
  if (f) f.disabled = S.histIdx >= S.hist.length - 1;
}
function goBack() {
  if (S.histIdx <= 0) return;
  S.histIdx--;
  _navFromHist = true;
  const e = S.hist[S.histIdx];
  go(e.sec, e.data);
}
function goForward() {
  if (S.histIdx >= S.hist.length - 1) return;
  S.histIdx++;
  _navFromHist = true;
  const e = S.hist[S.histIdx];
  go(e.sec, e.data);
}
document.addEventListener('keydown', e => {
  if (e.altKey && e.key === 'ArrowLeft')  { e.preventDefault(); goBack(); }
  if (e.altKey && e.key === 'ArrowRight') { e.preventDefault(); goForward(); }
});

function go(sec, data) {
  const _targetScroll = S.scroll[sec] || 0;
  if (!_navFromHist) {
    S.hist  = S.hist.slice(0, S.histIdx + 1);
    S.hist.push({ sec, data: data ?? null });
    S.histIdx = S.hist.length - 1;
  }
  _navFromHist = false;
  S.sec = sec;
  const base = {
    cliente: 'clientes', pieza: 'clientes',
    pedido: 'pedidos', remito: 'remitos',
    modelo: 'modelos', fundicion: 'fundiciones', documento: 'documentos',
    trabajo: 'trabajos',
    db: 'dashboard'
  }[sec] || sec;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.sec === base)
  );
  destroyCharts();
  const fn = {
    dashboard: showDashboard, clientes: showClientes,
    cliente: ()=>showCliente(data), pieza: ()=>showPieza(data),
    analisis: showAnalisis, trabajos: showTrabajos, trabajo: ()=>showTrabajoDetail(data),
    pedidos: showPedidos, pedido: ()=>showPedidoDetail(data),
    remitos: showRemitos, remito: ()=>showRemitoDetail(data),
    piezas: showPiezasCat,
    modelos: showModelos, modelo: ()=>showModeloDetail(data),
    fundiciones: showFundiciones, fundicion: ()=>showFundicionDetail(data),
    documentos: showDocumentos, documento: ()=>showDocumentoDetail(data),
    mejores_clientes: showMejoresClientes,
    rechazos: showRechazos,
    stock: showStock,
    personal: showPersonal, personal_detalle: ()=>showPersonalDetalle(data),
    db: showExplorer,
    presentacion: showPresentacion
  }[sec];
  if (fn) fn();
  S._pendingScroll = _targetScroll;
  _updateHistBtns();
}

// ── Sync ───────────────────────────────────────────────────────────────────────
let _syncTimer;
async function pollSync() {
  try {
    const s = await api('/api/sync/status');
    const dot = $id('sync-dot');
    const lbl = $id('sync-label');
    if (!dot) return;
    dot.className = 'sync-dot' + (s.status === 'syncing' ? ' syncing' : s.status === 'error' ? ' error' : '');
    lbl.textContent = s.status === 'syncing' ? 'Sincronizando...'
      : s.status === 'error' ? 'Error en sync'
      : s.last_sync ? 'Sync: ' + s.last_sync.slice(0,16)
      : 'Listo';

    // Progress bar
    const bar = $id('sync-progress');
    const fill = $id('prog-fill');
    const phase = $id('prog-phase');
    const pct = $id('prog-pct');
    if (s.status === 'syncing') {
      bar.classList.add('visible');
      const p = s.progress || {};
      phase.textContent = p.phase || 'Sincronizando...';
      if (p.total > 0) {
        const perc = Math.round(p.done / p.total * 100);
        fill.classList.remove('indeterminate');
        fill.style.width = perc + '%';
        pct.textContent = perc + '%';
      } else {
        fill.classList.add('indeterminate');
        fill.style.width = '30%';
        pct.textContent = '';
      }
      _syncTimer = setTimeout(pollSync, 2000);
    } else {
      bar.classList.remove('visible');
    }
  } catch(e) {}
}

async function triggerSync() {
  try { await fetch('/api/sync', { method: 'POST' }); pollSync(); } catch(e) {}
}

// ── Dashboard ──────────────────────────────────────────────────────────────────
function _renderVencTbl(rows, elId, emptyMsg) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">' + emptyMsg + '</div>'; return; }
  let tbody = '';
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const dias = (r.dias != null) ? r.dias : 0;
    const cls = dias >= 0
      ? (dias <= 2 ? 'venc-2' : dias <= 7 ? 'venc-7' : dias <= 15 ? 'venc-15' : 'venc-30')
      : 'venc-7';
    const diasLabel = dias === 0
      ? '<strong style="color:var(--red)">HOY</strong>'
      : dias < 0
        ? '<strong style="color:var(--red)">&#8722;' + Math.abs(dias) + 'd</strong>'
        : '+' + dias + 'd';
    const codPieza = r.codigo_pieza
      ? '<div style="font-size:10px;color:var(--muted)">' + r.codigo_pieza + '</div>'
      : '';
    const otMain = r.ot_id
      ? '<code style="color:var(--accent);font-size:13px">&#35;' + r.ot_id + '</code>'
        + (r.ot_estado ? '<div style="font-size:10px;color:var(--muted)">' + r.ot_estado + '</div>' : '')
      : '<span style="color:var(--muted);font-size:11px">sin OT</span>';
    const pedLink = '<code style="color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="event.stopPropagation();go(\'pedido\',' + r.idpedido + ')">'
      + (r.nropedido || r.idpedido) + '</code>';
    const prod = r.tot_producida || 0;
    const rech = r.tot_rechazada || 0;
    const ent  = r.tot_entregada || 0;
    const netas = prod - rech;
    const ped = r.cantidadpedida || 0;
    const prodOk = (prod >= ped && ped > 0) ? ' prod-ok' : '';
    const netaColor = (netas >= ped || prod >= ped) ? 'var(--green)' : 'var(--accent)';
    const cantCell = ped
      + (prod > 0
          ? ' / <span style="color:' + netaColor + '">' + netas + '</span>'
          : '')
      + (rech > 0 ? '<span style="font-size:10px;color:var(--red)"> &#8722;' + rech + '</span>' : '')
    const rowClick = r.ot_id ? 'go(\'trabajo\',' + r.ot_id + ')' : 'go(\'pedido\',' + r.idpedido + ')';
    tbody += '<tr class="tr-link ' + cls + prodOk + '" onclick="' + rowClick + '">'
      + '<td>' + otMain + '</td>'
      + '<td>' + pedLink + '<div style="font-size:11px;color:var(--muted)">' + (r.cliente_nombre || '—') + '</div></td>'
      + '<td style="font-size:12px">' + (r.nombrepieza || '—') + codPieza + '</td>'
      + '<td style="text-align:right;font-weight:600;white-space:nowrap">' + cantCell + '</td>'
      + '<td style="white-space:nowrap;font-size:12px">' + (r.fecha_entrega || '—') + '</td>'
      + '<td style="text-align:right">' + diasLabel + '</td>'
      + '</tr>';
  }
  el.innerHTML = '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>&#218;lt. OT</th><th>Pedido / Cliente</th><th>Pieza</th>'
    + '<th style="text-align:right">Cantidad pedida / neta</th><th>Fecha</th>'
    + '<th style="text-align:right">D&#237;as</th>'
    + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
}

function _renderEntregadosTbl(rows, elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">Sin entregas en los últimos 90 días</div>'; return; }
  let tbody = '';
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const completo = r.tot_entregada >= r.cantidadpedida;
    const cls = completo ? 'ent-completo' : 'ent-parcial';
    const entLabel = r.tot_entregada + ' / ' + r.cantidadpedida;
    const pct = r.cantidadpedida > 0 ? Math.round(r.tot_entregada / r.cantidadpedida * 100) : 0;
    const codPieza = r.codigo_pieza
      ? '<div style="font-size:10px;color:var(--muted)">' + r.codigo_pieza + '</div>' : '';
    const otMain = r.ot_id
      ? '<code style="color:var(--accent);font-size:13px">&#35;' + r.ot_id + '</code>'
        + (r.ot_estado ? '<div style="font-size:10px;color:var(--muted)">' + r.ot_estado + '</div>' : '')
      : '<span style="color:var(--muted);font-size:11px">sin OT</span>';
    const pedLink = '<code style="color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="event.stopPropagation();go(\'pedido\',' + r.idpedido + ')">'
      + (r.nropedido || r.idpedido) + '</code>';
    const rowClick = r.ot_id ? 'go(\'trabajo\',' + r.ot_id + ')' : 'go(\'pedido\',' + r.idpedido + ')';
    tbody += '<tr class="tr-link ' + cls + '" onclick="' + rowClick + '">'
      + '<td>' + otMain + '</td>'
      + '<td>' + pedLink + '<div style="font-size:11px;color:var(--muted)">' + (r.cliente_nombre || '—') + '</div></td>'
      + '<td style="font-size:12px">' + (r.nombrepieza || '—') + codPieza + '</td>'
      + '<td style="text-align:right;font-weight:600">' + entLabel
        + ' <span style="font-size:10px;color:var(--muted)">(' + pct + '%)</span></td>'
      + '<td style="white-space:nowrap;font-size:12px">' + (r.fecha_entrega || '—') + '</td>'
      + '</tr>';
  }
  el.innerHTML = '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>&#218;lt. OT</th><th>Pedido / Cliente</th><th>Pieza</th>'
    + '<th style="text-align:right">Entregadas / Pedidas</th>'
    + '<th>Fecha</th>'
    + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
}

const _dashGroups = {};
const _pedClickTimers = {};
const _dashOpen = {};

function dashPedClick(event, key, idpedido) {
  if (event.detail >= 2) {
    clearTimeout(_pedClickTimers[key+'-'+idpedido]);
    delete _pedClickTimers[key+'-'+idpedido];
    go('pedido', idpedido);
    return;
  }
  if (_pedClickTimers[key+'-'+idpedido]) return;
  const multi = event.shiftKey;
  _pedClickTimers[key+'-'+idpedido] = setTimeout(() => {
    delete _pedClickTimers[key+'-'+idpedido];
    togglePedidoItems(key, idpedido, multi);
  }, 220);
}

function togglePedidoItems(key, idpedido, multi) {
  const det  = $id('tr-det-'+key+'-'+idpedido);
  const icon = $id('exp-'+key+'-'+idpedido);
  if (!det) return;
  const opening = det.style.display === 'none';
  if (opening && !multi && _dashOpen[key] && _dashOpen[key] !== idpedido) {
    const prevDet  = $id('tr-det-'+key+'-'+_dashOpen[key]);
    const prevIcon = $id('exp-'+key+'-'+_dashOpen[key]);
    if (prevDet)  prevDet.style.display = 'none';
    if (prevIcon) prevIcon.textContent = '►';
    _dashOpen[key] = null;
  }
  det.style.display = opening ? 'table-row' : 'none';
  if (icon) icon.textContent = opening ? '▼' : '►';
  _dashOpen[key] = opening ? idpedido : null;
  if (opening && !det.dataset.loaded) {
    det.dataset.loaded = '1';
    const items = _dashGroups[key+'-'+idpedido] || [];
    det.querySelector('td').innerHTML = key === 'entregados'
      ? _subRowsEnt(items) : _subRowsVenc(items);
  }
}

function _subRowsVenc(items) {
  let rows = '';
  for (const r of items) {
    const dias = r.dias != null ? r.dias : 0;
    const diasLabel = dias === 0
      ? '<strong style="color:var(--red)">HOY</strong>'
      : dias < 0 ? '<strong style="color:var(--red)">−'+Math.abs(dias)+'d</strong>'
      : '+'+dias+'d';
    const prod = r.tot_producida||0, rech = r.tot_rechazada||0, ped = r.cantidadpedida||0;
    const netas = prod - rech;
    const netaColor = (netas >= ped || prod >= ped) ? 'var(--green)' : 'var(--accent)';
    const cantCell = ped
      + (prod > 0 ? ' / <span style="color:'+netaColor+'">'+netas+'</span>' : '')
      + (rech > 0 ? '<span style="font-size:10px;color:var(--red)"> −'+rech+'</span>' : '');
    const otCell = r.ot_id
      ? '<code style="color:var(--accent);cursor:pointer" onclick="event.stopPropagation();go(\'trabajo\','+r.ot_id+')">#'+r.ot_id+'</code>'
        +(r.ot_estado ? '<div style="font-size:10px;color:var(--muted)">'+r.ot_estado+'</div>' : '')
      : '<span style="color:var(--muted);font-size:11px">sin OT</span>';
    const cls = dias >= 0
      ? (dias <= 2 ? 'venc-2' : dias <= 7 ? 'venc-7' : dias <= 15 ? 'venc-15' : 'venc-30')
      : 'venc-7';
    const prodOk = (prod >= ped && ped > 0) ? ' prod-ok' : '';
    const codPieza = r.codigo_pieza ? '<div style="font-size:10px;color:var(--muted)">'+r.codigo_pieza+'</div>' : '';
    rows += '<tr class="'+cls+prodOk+'">'
      + '<td style="padding-left:4px">'+otCell+'</td>'
      + '<td style="font-size:12px">'+(r.nombrepieza||'')+codPieza+'</td>'
      + '<td style="text-align:right;white-space:nowrap;font-weight:600">'+cantCell+'</td>'
      + '<td style="white-space:nowrap;font-size:12px">'+(r.fecha_entrega||'')+'</td>'
      + '<td style="text-align:right">'+diasLabel+'</td>'
      + '</tr>';
  }
  const thBase = 'font-size:10px;font-weight:600;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);white-space:nowrap';
  const th  = 'style="'+thBase+'"';
  const thr = 'style="'+thBase+';text-align:right"';
  const thead = '<thead><tr>'
    + '<th '+th+'>&#218;lt. OT</th>'
    + '<th '+th+'>Pieza</th>'
    + '<th '+thr+'>Cant. ped / neta</th>'
    + '<th '+th+'>Fecha</th>'
    + '<th '+thr+'>D&#237;as</th>'
    + '</tr></thead>';
  return '<table style="width:100%;border-collapse:collapse;margin-top:8px">'+thead+'<tbody>'+rows+'</tbody></table>';
}

function _subRowsEnt(items) {
  let rows = '';
  for (const r of items) {
    const ped = r.cantidadpedida||0, ent = r.tot_entregada||0;
    const pct = ped > 0 ? Math.round(ent/ped*100) : 0;
    const cls = ent >= ped ? 'ent-completo' : 'ent-parcial';
    const otCell = r.ot_id
      ? '<code style="color:var(--accent);cursor:pointer" onclick="event.stopPropagation();go(\'trabajo\','+r.ot_id+')">#'+r.ot_id+'</code>'
        +(r.ot_estado ? '<div style="font-size:10px;color:var(--muted)">'+r.ot_estado+'</div>' : '')
      : '<span style="color:var(--muted);font-size:11px">sin OT</span>';
    const codPieza = r.codigo_pieza ? '<div style="font-size:10px;color:var(--muted)">'+r.codigo_pieza+'</div>' : '';
    rows += '<tr class="'+cls+'">'
      + '<td style="padding-left:4px">'+otCell+'</td>'
      + '<td style="font-size:12px">'+(r.nombrepieza||'')+codPieza+'</td>'
      + '<td style="text-align:right;font-weight:600">'+ent+' / '+ped
      + ' <span style="font-size:10px;color:var(--muted)">('+pct+'%)</span></td>'
      + '<td style="white-space:nowrap;font-size:12px">'+(r.fecha_entrega||'')+'</td>'
      + '</tr>';
  }
  const thBase = 'font-size:10px;font-weight:600;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);white-space:nowrap';
  const th  = 'style="'+thBase+'"';
  const thr = 'style="'+thBase+';text-align:right"';
  const thead = '<thead><tr>'
    + '<th '+th+'>&#218;lt. OT</th>'
    + '<th '+th+'>Pieza</th>'
    + '<th '+thr+'>Entregadas / Pedidas</th>'
    + '<th '+th+'>Fecha</th>'
    + '</tr></thead>';
  return '<table style="width:100%;border-collapse:collapse;margin-top:8px">'+thead+'<tbody>'+rows+'</tbody></table>';
}

function _renderVencTblByPedido(rows, elId, emptyMsg, key) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">' + emptyMsg + '</div>'; return; }
  const map = new Map();
  for (const r of rows) {
    if (!map.has(r.idpedido)) {
      map.set(r.idpedido, {
        idpedido: r.idpedido, nropedido: r.nropedido, cliente_nombre: r.cliente_nombre,
        piezas: [], items: [], tot_pedida: 0, tot_producida: 0, tot_rechazada: 0,
        dias: r.dias, fecha_entrega: r.fecha_entrega,
      });
    }
    const g = map.get(r.idpedido);
    g.piezas.push(r.nombrepieza || '?');
    g.items.push(r);
    g.tot_pedida    += r.cantidadpedida  || 0;
    g.tot_producida += r.tot_producida   || 0;
    g.tot_rechazada += r.tot_rechazada   || 0;
    if (r.dias != null && r.dias < g.dias) { g.dias = r.dias; g.fecha_entrega = r.fecha_entrega; }
  }
  let tbody = '';
  for (const g of map.values()) {
    _dashGroups[key+'-'+g.idpedido] = g.items;
    const dias = g.dias != null ? g.dias : 0;
    const cls = dias >= 0
      ? (dias <= 2 ? 'venc-2' : dias <= 7 ? 'venc-7' : dias <= 15 ? 'venc-15' : 'venc-30')
      : 'venc-7';
    const diasLabel = dias === 0
      ? '<strong style="color:var(--red)">HOY</strong>'
      : dias < 0 ? '<strong style="color:var(--red)">&#8722;' + Math.abs(dias) + 'd</strong>'
      : '+' + dias + 'd';
    const prod = g.tot_producida, rech = g.tot_rechazada, ped = g.tot_pedida;
    const netas = prod - rech;
    const prodOk = (prod >= ped && ped > 0) ? ' prod-ok' : '';
    const netaColor = (netas >= ped || prod >= ped) ? 'var(--green)' : 'var(--accent)';
    const cantCell = ped
      + (prod > 0 ? ' / <span style="color:' + netaColor + '">' + netas + '</span>' : '')
      + (rech > 0 ? '<span style="font-size:10px;color:var(--red)"> &#8722;' + rech + '</span>' : '');
    const piezasLabel = g.piezas.length <= 2 ? g.piezas.join(', ') : g.piezas.length + ' piezas';
    tbody += '<tr class="tr-link ' + cls + prodOk + '" onclick="dashPedClick(event,\''+key+'\','+g.idpedido+')">'
      + '<td><span id="exp-'+key+'-'+g.idpedido+'" style="margin-right:5px;font-size:10px;opacity:.6">&#9654;</span>'
      + '<code style="color:var(--accent)">' + (g.nropedido || g.idpedido) + '</code>'
      + '<div style="font-size:11px;color:var(--muted)">' + (g.cliente_nombre || '') + '</div></td>'
      + '<td style="font-size:12px">' + piezasLabel + '</td>'
      + '<td style="text-align:right;font-weight:600;white-space:nowrap">' + cantCell + '</td>'
      + '<td style="white-space:nowrap;font-size:12px">' + (g.fecha_entrega || '') + '</td>'
      + '<td style="text-align:right">' + diasLabel + '</td>'
      + '</tr>'
      + '<tr class="tr-sub" id="tr-det-'+key+'-'+g.idpedido+'" style="display:none">'
      + '<td colspan="5" style="padding:0 0 6px 28px"></td>'
      + '</tr>';
  }
  el.innerHTML = '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>Pedido / Cliente</th><th>Piezas</th>'
    + '<th style="text-align:right">Cant. ped / neta</th>'
    + '<th>Fecha urgente</th><th style="text-align:right">D&#237;as</th>'
    + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
}

function _renderEntregadosTblByPedido(rows, elId, key) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!rows || !rows.length) { el.innerHTML = '<div class="empty">Sin entregas en los &#250;ltimos 90 d&#237;as</div>'; return; }
  const map = new Map();
  for (const r of rows) {
    if (!map.has(r.idpedido)) {
      map.set(r.idpedido, {
        idpedido: r.idpedido, nropedido: r.nropedido, cliente_nombre: r.cliente_nombre,
        piezas: [], items: [], tot_pedida: 0, tot_entregada: 0, fecha_entrega: r.fecha_entrega,
      });
    }
    const g = map.get(r.idpedido);
    g.piezas.push(r.nombrepieza || '?');
    g.items.push(r);
    g.tot_pedida    += r.cantidadpedida  || 0;
    g.tot_entregada += r.tot_entregada   || 0;
  }
  let tbody = '';
  for (const g of map.values()) {
    _dashGroups[key+'-'+g.idpedido] = g.items;
    const completo = g.tot_entregada >= g.tot_pedida;
    const cls = completo ? 'ent-completo' : 'ent-parcial';
    const pct = g.tot_pedida > 0 ? Math.round(g.tot_entregada / g.tot_pedida * 100) : 0;
    const piezasLabel = g.piezas.length <= 2 ? g.piezas.join(', ') : g.piezas.length + ' piezas';
    tbody += '<tr class="tr-link ' + cls + '" onclick="dashPedClick(event,\''+key+'\','+g.idpedido+')">'
      + '<td><span id="exp-'+key+'-'+g.idpedido+'" style="margin-right:5px;font-size:10px;opacity:.6">&#9654;</span>'
      + '<code style="color:var(--accent)">' + (g.nropedido || g.idpedido) + '</code>'
      + '<div style="font-size:11px;color:var(--muted)">' + (g.cliente_nombre || '') + '</div></td>'
      + '<td style="font-size:12px">' + piezasLabel + '</td>'
      + '<td style="text-align:right;font-weight:600">' + g.tot_entregada + ' / ' + g.tot_pedida
      + ' <span style="font-size:10px;color:var(--muted)">(' + pct + '%)</span></td>'
      + '<td style="white-space:nowrap;font-size:12px">' + (g.fecha_entrega || '') + '</td>'
      + '</tr>'
      + '<tr class="tr-sub" id="tr-det-'+key+'-'+g.idpedido+'" style="display:none">'
      + '<td colspan="4" style="padding:0 0 6px 28px"></td>'
      + '</tr>';
  }
  el.innerHTML = '<div class="tbl-wrap"><table>'
    + '<thead><tr><th>Pedido / Cliente</th><th>Piezas</th>'
    + '<th style="text-align:right">Entregadas / Pedidas</th><th>Fecha</th>'
    + '</tr></thead><tbody>' + tbody + '</tbody></table></div>';
}

function _renderDashTable(key, elId, emptyMsg) {
  const rows = S._dashRows[key];
  if (!rows) return;
  if (S.dashView === 'pedido') {
    if (key === 'entregados') _renderEntregadosTblByPedido(rows, elId, key);
    else _renderVencTblByPedido(rows, elId, emptyMsg || '', key);
  } else {
    if (key === 'entregados') _renderEntregadosTbl(rows, elId);
    else _renderVencTbl(rows, elId, emptyMsg || '');
  }
}

function toggleDashView() {
  S.dashView = S.dashView === 'ot' ? 'pedido' : 'ot';
  const btn  = $id('dash-view-btn');
  const hint = $id('dash-expand-hint');
  if (btn)  btn.textContent = S.dashView === 'pedido' ? '⋮⋮ Por OT' : '⋮⋮ Por pedido';
  if (hint) hint.style.visibility = S.dashView === 'pedido' ? 'visible' : 'hidden';
  _renderDashTable('vencidos',  'dash-vencidos',  'Sin pedidos vencidos');
  _renderDashTable('proximos',  'dash-proximos',  'Sin pedidos por vencer en los próximos 30 días');
  _renderDashTable('entregados','dash-entregados');
}

// ── Mejores clientes ───────────────────────────────────────────────────────────
let _mejoresData = [];
let _mejoresSort = { col: 'pct', dir: 'desc' };
let _mejoresMes      = (()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); })();
let _mejoresNMeses   = 12;
let _mejoresFechaRef = null;

function _sortMejores(col) {
  if (_mejoresSort.col === col) {
    _mejoresSort.dir = _mejoresSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    _mejoresSort.col = col;
    _mejoresSort.dir = col === 'ultimo_pedido' ? 'desc' : 'desc';
  }
  _renderMejoresTable();
}

function _renderMejoresTable() {
  const el = $id('mejores-tbody');
  if (!el) return;
  const { col, dir } = _mejoresSort;
  const sorted = [..._mejoresData].sort((a, b) => {
    let va = a[col], vb = b[col];
    if (col === 'ultimo_pedido') { va = va || ''; vb = vb || ''; }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  const arrow = dir === 'desc' ? ' &#9660;' : ' &#9650;';
  [['th-pct','pct'],['th-kg','tot_kg'],['th-ultimo','ultimo_pedido']].forEach(([id, key]) => {
    const th = $id(id);
    if (th) th.innerHTML = th.dataset.label + (col === key ? arrow : '');
  });
  const maxByCol = col === 'tot_kg' ? Math.max(...sorted.map(r => r.tot_kg||0)) || 1
                                    : Math.max(...sorted.map(r => r.pct||0)) || 1;
  el.innerHTML = sorted.map((r, i) => {
    const pctBarW = Math.round((r.pct / (Math.max(...sorted.map(x=>x.pct))||1)) * 100);
    const kgBarW  = Math.round(((r.tot_kg||0) / (Math.max(...sorted.map(x=>x.tot_kg||0))||1)) * 100);
    const _ref = _mejoresFechaRef ? _mejoresFechaRef.getTime() : Date.now();
    const diasDesde = r.ultimo_pedido
      ? Math.round((_ref - new Date(r.ultimo_pedido)) / 86400000)
      : null;
    const diasLabel = diasDesde === null ? '—'
      : diasDesde <= 30  ? '<span style="color:var(--green)">' + diasDesde + 'd</span>'
      : diasDesde <= 180 ? '<span style="color:var(--accent)">' + diasDesde + 'd</span>'
      : '<span style="color:var(--muted)">' + diasDesde + 'd</span>';
    const kgLabel = r.tot_kg > 0
      ? (r.tot_kg >= 1000 ? (r.tot_kg/1000).toFixed(1)+'t' : r.tot_kg.toFixed(1)+'kg')
      : '<span style="color:var(--muted)">—</span>';
    const bar = (w, color) => '<div style="flex:1;height:6px;border-radius:3px;background:var(--border);overflow:hidden">'
      + '<div style="width:'+w+'%;height:100%;background:'+color+';border-radius:3px"></div></div>';
    return '<tr class="tr-link" onclick="go(\'cliente\',\'' + r.codigo + '\')">'
      + '<td style="color:var(--muted);width:30px;text-align:right">' + (i+1) + '</td>'
      + '<td><div style="font-weight:600">' + (r.nombre||r.codigo) + '</div>'
      + '<div style="font-size:11px;color:var(--muted)">' + r.codigo + '</div></td>'
      + '<td style="text-align:right;white-space:nowrap">' + fmt(r.tot_entregada) + '</td>'
      + '<td style="min-width:150px"><div style="display:flex;align-items:center;gap:8px">'
      + bar(pctBarW,'var(--accent)')
      + '<span style="width:42px;text-align:right;font-size:12px">' + r.pct.toFixed(1) + '%</span>'
      + '</div></td>'
      + (r.tot_kg === 0
          ? '<td class="kg-miss" style="min-width:140px"></td>'
          : '<td style="min-width:140px"><div style="display:flex;align-items:center;gap:8px">'
            + bar(kgBarW,'var(--green)')
            + '<span style="width:52px;text-align:right;font-size:12px">' + kgLabel + '</span>'
            + '</div></td>')
      + '<td style="text-align:right;white-space:nowrap">' + (r.ultimo_pedido||'—') + '</td>'
      + '<td style="text-align:right">' + diasLabel + '</td>'
      + '<td style="text-align:right;color:var(--muted)">' + fmt(r.n_pedidos) + '</td>'
      + '</tr>';
  }).join('');
}

async function _loadMejoresData() {

  return {
    url_qs: '?date_from=' + iso(fromDate) + '&date_to=' + iso(toDate),
    label: meses[fromDate.getMonth()] + ' ' + fromDate.getFullYear()
         + ' – ' + meses[toDate.getMonth()] + ' ' + toDate.getFullYear(),
  };
}

async function _rechPrint() {
  const tab = _rechTab;
  const { label } = _rechDateParams();
  const period = label || 'Todo el período';

  const tabMeta = {
    rech: { title: 'Rechazos internos',       color: '#ef5350' },
    dev:  { title: 'Devoluciones externas',   color: '#a78bfa' },
    tend: { title: 'Tendencia por piezas',    color: '#66bb6a' },
    ed:   { title: 'Entregas / Devoluciones', color: '#ffa726' },
  };
  const meta = tabMeta[tab] || { title: tab, color: '#333' };

  let subtitle = '';
  if (tab === 'ed' && _edCliente) {
    subtitle = `Cliente: ${_edCliente.nombre} (${_edCliente.codigo})`;
    if (_edPiezas.length) subtitle += ' · Piezas: ' + _edPiezas.map(p => p.nombre).join(', ');
  } else if (tab === 'tend' && _tendPiezas && _tendPiezas.length) {
    subtitle = 'Piezas: ' + _tendPiezas.map(p => p.nombre).join(', ');
  }

  // For rech/dev use the full panel; for tend/ed use only the data area (skip filter UI)
  const contentId = (tab === 'tend') ? 'tend-content'
                  : (tab === 'ed')   ? 'ed-content'
                  : 'rech-panel-' + tab;
  const contentEl = $id(contentId);
  if (!contentEl) return;

  const clone = contentEl.cloneNode(true);

  // Replace Chart.js canvases with PNG images so they print
  if (tab === 'tend') {
    const canvases = contentEl.querySelectorAll('canvas');
    const cloneCanvases = clone.querySelectorAll('canvas');
    canvases.forEach((c, i) => {
      if (!cloneCanvases[i]) return;
      const img = document.createElement('img');
      img.src = c.toDataURL('image/png');
      img.style.cssText = 'width:100%;display:block';
      cloneCanvases[i].replaceWith(img);
    });
  }

  // Strip interactive noise
  clone.querySelectorAll('input,button,[id$="-dropdown"]').forEach(el => el.remove());

  const w = window.open('', '_blank', 'width=940,height=720,scrollbars=yes');
  if (!w) { alert('Permitir ventanas emergentes para usar esta función.'); return; }
  w.document.open();
  w.document.write(`<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<title>${meta.title} — ${period}</title>
<style>
:root{--red:#ef5350;--yellow:#ffa726;--green:#66bb6a;--accent:#4fc3f7;--fg:#111;--muted:#666;--border:#ddd;--surface2:#f5f5f5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;color:#111;background:#fff;padding:24px 28px}
h1{font-size:17px;font-weight:700;color:${meta.color};margin-bottom:3px}
.sub{font-size:11px;color:#444;margin-bottom:3px}
.period{font-size:11px;color:#888;margin-bottom:20px}
table{border-collapse:collapse;width:100%;margin-bottom:16px;font-size:12px}
th{text-align:left;padding:5px 8px;background:#f2f2f2;border-bottom:2px solid #ccc;font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:middle}
tfoot td{border-top:2px solid #ccc;border-bottom:none;font-weight:600;padding-top:6px}
.tbl-wrap{overflow:visible!important}
.card{padding:0!important;background:none!important;border:none!important;box-shadow:none!important;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-box{background:#f9f9f9;border-radius:6px;padding:8px}
.chart-box img{width:100%;display:block}
.c-red{color:#c62828}.c-yellow{color:#e65100}
@media print{body{padding:0}@page{margin:15mm;size:A4}}
</style></head><body>
<h1>${meta.title}</h1>
${subtitle ? `<div class="sub">${subtitle}</div>` : ''}
<div class="period">Período: ${period}</div>
${clone.outerHTML}
</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

  _rechTab = tab;

    rech: { color: 'var(--accent)' },
    dev:  { color: 'var(--red)' },
    tend: { color: 'var(--green)' },

    `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 10px;

async function _loadTendenciaData() {
  const el = $id('tend-content');
  if (!el) return;
  if (!_tendPiezas.length) {
    if (_tendChart) { _tendChart.destroy(); _tendChart = null; }
    el.innerHTML = '<div style="color:var(--muted);padding:24px;text-align:center;font-size:13px">Agregá piezas para analizar su tendencia.</div>';
    return;
  }
  el.innerHTML = '<div class="loading">Cargando…</div>';
  try {
    const qs = _tendPiezas.map(p => 'ids=' + p.id).join('&');
    const d = await api('/api/analytics/tendencia_piezas?' + qs);
    _renderTendContent(d);
  } catch(e) {
    el.innerHTML = '<div style="color:var(--red);padding:16px">Error: ' + e.message + '</div>';
  }

        { label: 'Devueltas',   data: d.anual.map(r => r.devueltas),   backgroundColor: '#a78bfabb', borderRadius: 3 },

  if (!val.trim()) { dd.style.display = 'none'; return; }
  _edSearchTimer = setTimeout(async () => {
    try {
      const data = await api('/api/analytics/clientes?search=' + encodeURIComponent(val.trim()));
      if (!data.length) { dd.style.display = 'none'; return; }
      dd.innerHTML = data.map(c =>
        `<div class="tend-dd-item"
          onclick="_edPickCliente('${c.codigo.replace(/'/g,"\\'")}','${(c.fantasia||c.nombre).replace(/'/g,"\\'")}');$id('ed-q').value='';$id('ed-dropdown').style.display='none'"
          style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px">
          <span style="font-size:13px">${c.fantasia||c.nombre}</span>
          <span style="font-size:11px;color:var(--muted)">${c.codigo} · ${c.n_piezas} piezas</span>
        </div>`
      ).join('');
      dd.style.display = 'block';
    } catch(e) {}
  }, 200);
}

function _edPickCliente(codigo, nombre) {
  _edCliente = { codigo, nombre };
  _edPiezas = [];
  _edOnlyDevueltas = false;
  _edLastData = null;
  const chip = $id('ed-cliente-chip');
  if (chip) chip.innerHTML = `
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 8px 4px 12px;
      border-radius:12px;background:var(--surface2);border:1px solid var(--border);font-size:13px">
      ${nombre}
      <span style="font-size:11px;color:var(--muted)">${codigo}</span>
      <span onclick="_edClearCliente()" style="cursor:pointer;opacity:.5;font-size:18px;line-height:1;padding:0 3px">&times;</span>
    </span>`;
  const pf = $id('ed-pieza-filter');
  if (pf) pf.style.display = '';
  _edRenderPiezaChips();
  _loadEdData();
}

function _edClearCliente() {
  _edCliente = null;
  _edPiezas = [];
  const chip = $id('ed-cliente-chip');
  if (chip) chip.innerHTML = '';
  const pf = $id('ed-pieza-filter');
  if (pf) pf.style.display = 'none';
  const pq = $id('ed-pieza-q');
  if (pq) pq.value = '';
  const dd = $id('ed-pieza-dropdown');
  if (dd) dd.style.display = 'none';
  _edRenderPiezaChips();
  const el = $id('ed-content');
  if (el) el.innerHTML = '<div style="color:var(--muted);padding:24px;text-align:center;font-size:13px">Seleccioná un cliente para ver el detalle.</div>';
}

async function _loadEdData() {
  if (!_edCliente) return;
  const el = $id('ed-content');
  if (el) el.innerHTML = '<div class="loading">Cargando…</div>';
  try {
    const { url_qs } = _rechDateParams();
    const piezasQs = _edPiezas.map(p => '&piezas=' + p.id).join('');
    const d = await api('/api/analytics/entregas_devol?cliente=' + encodeURIComponent(_edCliente.codigo) + url_qs.replace('?','&') + piezasQs);
    _edLastData = d;
    _renderEdContent(d);
  } catch(e) {
    if (el) el.innerHTML = '<div style="color:var(--red);padding:16px">Error: ' + e.message + '</div>';
  }
}

function _renderEdContent(d) {
  const el = $id('ed-content');
  if (!el) return;

  // Apply "solo piezas con devoluciones" filter if active
  const devNombres = new Set(d.devoluciones.map(r => r.nombre));
  const entregas = _edOnlyDevueltas
    ? d.entregas.filter(r => devNombres.has(r.nombre))
    : d.entregas;
  const totalEntFiltradas = entregas.reduce((s, r) => s + (r.cant || 0), 0);

  const tot = d.totales;
  const pctColor = tot.pct > 10 ? 'var(--red)' : tot.pct > 5 ? 'var(--yellow)' : 'var(--green)';

  const entRows = entregas.map(r => `
    <tr>
      <td style="font-family:monospace;font-size:12px;color:var(--muted)">${r.codigo||'—'}</td>

      <td style="text-align:right;font-family:monospace">${r.remito||'—'}</td>
      <td style="text-align:right;font-weight:600">${fmt(r.cant)}</td>
      <td style="text-align:right;color:var(--muted);font-size:12px">${r.oc ? r.oc.replace(/^0+/,'') : '—'}</td>
      <td style="text-align:right;font-size:12px">${r.fecha ? r.fecha.slice(0,10) : '—'}</td>
    </tr>`).join('') || '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:12px">Sin entregas en el período</td></tr>';

  const devRows = d.devoluciones.map(r => `
    <tr>
      <td style="font-family:monospace;font-size:12px;color:var(--muted)">${r.codigo||'—'}</td>
      <td>${r.nombre||'—'}</td>
      <td style="text-align:right;font-weight:600;color:var(--red)">${fmt(r.cant)}</td>
      <td style="text-align:right;font-size:12px;color:var(--muted)">${r.semana||'—'}</td>
      <td style="text-align:right;font-size:12px">${r.fecha ? r.fecha.slice(0,10) : '—'}</td>
    </tr>`).join('') || '<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:12px">Sin devoluciones en el período</td></tr>';

  el.innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:120px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Entregas</div>
        <div style="font-size:24px;font-weight:700;color:var(--fg)">${fmt(tot.entregas)}</div>
      </div>
      <div class="card" style="flex:1;min-width:120px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Devueltas</div>
        <div style="font-size:24px;font-weight:700;color:var(--red)">${fmt(tot.devoluciones)}</div>
      </div>
      <div class="card" style="flex:1;min-width:120px;text-align:center">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">% Devolución</div>
        <div style="font-size:24px;font-weight:700;color:${pctColor}">${tot.pct}%</div>
      </div>
    </div>

    <label style="display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
      margin-bottom:12px;cursor:pointer;user-select:none">
      <input type="checkbox" ${_edOnlyDevueltas ? 'checked' : ''}
        onchange="_edOnlyDevueltas=this.checked;_renderEdContent(_edLastData)"
        style="cursor:pointer;accent-color:var(--red)">
      Solo piezas con devoluciones

    <div style="font-weight:700;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">

      <thead><tr>
        <th>Código</th><th>Pieza</th>
        <th style="text-align:right">Remito</th>
        <th style="text-align:right">Cant.</th>
        <th style="text-align:right">O/C</th>
        <th style="text-align:right">Fecha</th>
      </tr></thead>
      <tbody>${entRows}</tbody>
      <tfoot><tr>
        <td colspan="3" style="font-weight:600;padding-top:6px">TOTAL${_edOnlyDevueltas ? ' (filtrado)' : ''}</td>

function _rechChipFilter() {
  const chips = _getChips('rech');
  if (!chips.length) { _renderRechazosTable(_rechazosData); return; }
  const filtered = _rechazosData.filter(c => chips.every(ch => {
    const q = ch.raw.toLowerCase();
    return (c.nombre||'').toLowerCase().includes(q)
        || (c.codigo||'').toLowerCase().includes(q)
        || c.piezas.some(p =>
            (p.nombre||'').toLowerCase().includes(q) ||
            (p.codigo||'').toLowerCase().includes(q) ||
            p.fallos.some(f => (f.descripcion||'').toLowerCase().includes(q))
          );
  }));
  _renderRechazosTable(filtered);
}

function _devolChipFilter() {
  const chips = _getChips('rech');
  if (!chips.length) { _renderDevolTable(_devolData); return; }
  const filtered = _devolData.filter(c => chips.every(ch => {
    const q = ch.raw.toLowerCase();
    return (c.nombre||'').toLowerCase().includes(q)
        || (c.codigo||'').toLowerCase().includes(q)
        || c.piezas.some(p =>
            (p.nombre||'').toLowerCase().includes(q) ||
            (p.codigo||'').toLowerCase().includes(q) ||
            p.fallos.some(f => (f.descripcion||'').toLowerCase().includes(q))
          );
  }));
  _renderDevolTable(filtered);
}

function _renderRechazosTable(data) {

    const cls = c.pct_rechazo > 10 ? 'c-red' : c.pct_rechazo > 5 ? 'c-yellow' : '';

function toggleRechClient(codigo) {
  const det  = $id('rech-det-' + codigo);

  const opening = det.style.display === 'none';
  det.style.display = opening ? 'table-row' : 'none';

  const client = _rechazosData.find(c => c.codigo === codigo);

  const thS = 'font-size:10px;font-weight:600;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);white-space:nowrap';
  const thR = thS + ';text-align:right';

    + '<th style="' + thS + '">Pieza</th>'

    + '<th style="' + thR + '">Del cliente</th>'
    + '</tr></thead>';
  const piezaRows = client.piezas.map(p => {
    const pct = p.pct_rechazo != null ? p.pct_rechazo : (p.tot_producida > 0 ? (p.tot_rechazada / p.tot_producida * 100).toFixed(1) : '—');
    const pctCls = parseFloat(pct) > 10 ? 'color:var(--red)' : parseFloat(pct) > 5 ? 'color:var(--accent)' : '';
    return '<tr class="tr-link" onclick="toggleRechPieza(\'' + codigo + '\',' + p.idpieza + ')">'
      + '<td style="padding-left:24px"><span id="rech-pz-exp-' + codigo + '-' + p.idpieza + '" style="margin-right:5px;font-size:10px;opacity:.6">&#9654;</span>'

    + thead + '<tbody>' + piezaRows + '</tbody></table>';

  const client = _devolData.find(c => c.codigo === codigo);

  if (!pieza || !pieza.fallos.length) {
    det.querySelector('td').innerHTML = '<div style="padding:4px 0 4px 48px;font-size:11px;color:var(--muted)">Sin descripción de fallo registrada</div>';
    return;
  }
  const thS2 = 'font-size:10px;font-weight:600;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);white-space:nowrap';
  const thead2 = '<thead><tr>'
    + '<th style="' + thS2 + '">Descripción</th>'
    + '<th style="' + thS2 + ';text-align:right">Ocurr.</th>'
    + '<th style="' + thS2 + '">% del total</th>'
    + '<th style="' + thS2 + ';white-space:nowrap">Última vez</th>'
    + '</tr></thead>';
  const falloRows = pieza.fallos.map(f => {
    const semLabel = (f.ultimo_año && f.ultima_semana) ? ('Sem. ' + f.ultima_semana + '/' + f.ultimo_año) : '—';
    return '<tr><td style="padding-left:48px;font-size:12px"><span style="cursor:copy" onclick="chipAddText(\'rech\',\'' + (f.descripcion||'').replace(/'/g,'\\\'') + '\')" title="Filtrar por descripción">' + f.descripcion + '</span></td>'
      + '<td style="text-align:right;font-size:12px">' + f.ocurrencias + '</td>'
      + '<td style="min-width:120px"><div style="display:flex;align-items:center;gap:6px">'
      + '<div style="flex:1;height:5px;border-radius:3px;background:var(--border);overflow:hidden">'
      + '<div style="width:' + f.pct + '%;height:100%;background:var(--red);border-radius:3px"></div></div>'
      + '<span style="width:36px;text-align:right;font-size:11px">' + f.pct + '%</span>'
      + '</div></td>'
      + '<td style="font-size:11px;color:var(--muted);white-space:nowrap">' + semLabel + '</td>'
      + '</tr>';
  }).join('');
  det.querySelector('td').innerHTML = '<table style="width:100%;border-collapse:collapse;margin:4px 0 6px">'
    + thead2 + '<tbody>' + falloRows + '</tbody></table>';
}
